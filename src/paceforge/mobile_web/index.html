<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0F1117">
<title>PaceForge</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='6' y='18' width='5' height='8' rx='1' fill='%2310B981' opacity='.3'/><rect x='13' y='12' width='5' height='14' rx='1' fill='%2310B981' opacity='.6'/><rect x='20' y='5' width='5' height='21' rx='1' fill='%2310B981'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Figtree:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F1117;--surface:#161821;--card:#1A1D2B;--elevated:#1C1F2B;
  --border:rgba(148,163,194,.12);--border-s:rgba(148,163,194,.08);--border-x:rgba(148,163,194,.18);
  --text:#E8ECF4;--text-2:#8B95AD;--text-3:#5C6478;
  --emerald:#10B981;--emerald-d:rgba(16,185,129,.12);--emerald-g:rgba(16,185,129,.06);
  --amber:#F59E0B;--amber-d:rgba(245,158,11,.12);
  --sky:#0EA5E9;--sky-d:rgba(14,165,233,.12);
  --rose:#F43F5E;--rose-d:rgba(244,63,94,.12);
  --violet:#8B5CF6;
  --r:12px;--r-sm:8px;
  --ease:cubic-bezier(.23,1,.32,1);
  --font-d:'Manrope',sans-serif;--font-b:'Figtree',sans-serif;--font-m:'JetBrains Mono',monospace;
  --safe-b:env(safe-area-inset-bottom,0px);
}
html{height:100%;-webkit-tap-highlight-color:transparent}
body{
  font-family:var(--font-b);color:var(--text);background:var(--bg);
  min-height:100%;display:flex;flex-direction:column;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
input,textarea,select,button{font-family:inherit;font-size:inherit;color:inherit}
a{color:var(--emerald);text-decoration:none}

/* ── Layout ─────────────────────────────────── */
#app{flex:1;display:flex;flex-direction:column;min-height:100dvh}
.page{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(72px + var(--safe-b))}
.page.auth-page{display:flex;align-items:center;justify-content:center;padding:24px}

/* ── Bottom Nav ─────────────────────────────── */
.tab-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;padding:6px 0 calc(6px + var(--safe-b));z-index:100;
}
.tab-bar button{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  background:none;border:none;color:var(--text-3);font-size:10px;
  padding:6px 0;cursor:pointer;transition:color .15s;font-family:var(--font-b);
}
.tab-bar button.active{color:var(--emerald)}
.tab-bar button svg{width:22px;height:22px}

/* ── Auth ───────────────────────────────────── */
.auth-box{width:100%;max-width:380px}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo svg{width:48px;height:48px;margin-bottom:12px}
.auth-logo h1{font-family:var(--font-d);font-size:1.5rem;font-weight:800;letter-spacing:-.02em}
.auth-logo p{color:var(--text-2);font-size:.85rem;margin-top:4px}
.auth-form{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:24px}
.auth-form h2{font-family:var(--font-d);font-size:1.1rem;font-weight:700;margin-bottom:20px}
.field{margin-bottom:16px}
.field label{display:block;font-size:.8rem;font-weight:500;color:var(--text-2);margin-bottom:6px}
.field input{
  width:100%;background:var(--elevated);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:12px 14px;font-size:.95rem;outline:none;
  transition:border-color .15s;
}
.field input:focus{border-color:var(--emerald)}
.btn{
  width:100%;padding:13px;border:none;border-radius:var(--r-sm);
  font-weight:600;font-size:.95rem;cursor:pointer;
  transition:opacity .15s,transform .1s;
}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--emerald);color:#0F1117}
.btn-primary:disabled{opacity:.5}
.btn-ghost{background:transparent;color:var(--text-2);border:1px solid var(--border)}
.btn-link{
  background:none;border:none;color:var(--text-2);font-size:.85rem;
  padding:8px;cursor:pointer;width:100%;text-align:center;
}
.btn-link:hover{color:var(--emerald)}
.auth-footer{text-align:center;margin-top:16px;color:var(--text-3);font-size:.85rem}
.error-msg{background:var(--rose-d);color:var(--rose);padding:10px 14px;border-radius:var(--r-sm);font-size:.85rem;margin-bottom:12px}
.success-msg{background:var(--emerald-d);color:var(--emerald);padding:10px 14px;border-radius:var(--r-sm);font-size:.85rem;margin-bottom:12px}

/* ── Cards & Metrics ────────────────────────── */
.card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:16px;margin-bottom:12px;
}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.metric{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:14px;
}
.metric-label{font-size:.7rem;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.metric-value{font-family:var(--font-m);font-size:1.4rem;font-weight:700;margin-top:4px;line-height:1.2}
.metric-sub{font-size:.75rem;color:var(--text-2);margin-top:2px}
.section-title{
  font-family:var(--font-d);font-size:1rem;font-weight:700;
  margin-bottom:12px;display:flex;align-items:center;gap:8px;
}

/* ── Workout Cards ──────────────────────────── */
.workout-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;
  cursor:pointer;transition:border-color .15s;
}
.workout-card:active{border-color:var(--emerald)}
.wo-bar{width:4px;border-radius:2px;align-self:stretch;flex-shrink:0}
.wo-info{flex:1;min-width:0}
.wo-name{font-weight:600;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wo-meta{font-size:.78rem;color:var(--text-2);margin-top:2px}
.wo-badge{
  font-size:.65rem;font-weight:600;padding:3px 8px;border-radius:6px;
  white-space:nowrap;flex-shrink:0;
}

/* ── Week Selector ──────────────────────────── */
.week-nav{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.week-nav::-webkit-scrollbar{display:none}
.week-btn{
  flex-shrink:0;padding:8px 14px;border-radius:var(--r-sm);border:1px solid var(--border);
  background:var(--card);color:var(--text-2);font-size:.8rem;font-weight:600;
  cursor:pointer;white-space:nowrap;transition:all .15s;
}
.week-btn.active{background:var(--emerald);color:#0F1117;border-color:var(--emerald)}

/* ── Calendar ───────────────────────────────── */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-header h3{font-family:var(--font-d);font-weight:700;font-size:1rem}
.cal-nav{display:flex;gap:8px}
.cal-nav button{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  color:var(--text);cursor:pointer;font-size:1.1rem;
}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;gap:2px}
.cal-day-label{font-size:.65rem;color:var(--text-3);font-weight:600;padding:6px 0;text-transform:uppercase}
.cal-day{
  aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:.85rem;border-radius:var(--r-sm);cursor:pointer;
  position:relative;transition:background .15s;gap:2px;
}
.cal-day:active{background:var(--elevated)}
.cal-day.today{color:var(--emerald);font-weight:700}
.cal-day.selected{background:var(--emerald);color:#0F1117;font-weight:700}
.cal-day.other-month{color:var(--text-3);opacity:.4}
.cal-dots{display:flex;gap:3px;position:absolute;bottom:4px}
.cal-dot{width:5px;height:5px;border-radius:50%}
.cal-entry{
  display:flex;align-items:center;gap:10px;padding:12px 14px;
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  margin-bottom:8px;cursor:pointer;
}
.cal-entry-bar{width:4px;border-radius:2px;align-self:stretch;flex-shrink:0}
.cal-entry-info{flex:1;min-width:0}
.cal-entry-title{font-weight:600;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-entry-sub{font-size:.75rem;color:var(--text-2);margin-top:1px}

/* ── Feed ───────────────────────────────────── */
.feed-item{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:16px;margin-bottom:12px;
}
.feed-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.feed-avatar{
  width:36px;height:36px;border-radius:50%;background:var(--emerald-d);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.85rem;color:var(--emerald);flex-shrink:0;
}
.feed-user{font-weight:600;font-size:.9rem}
.feed-time{font-size:.75rem;color:var(--text-3)}
.feed-body{font-size:.88rem;line-height:1.5;color:var(--text-2);margin-bottom:10px}
.feed-actions{display:flex;gap:16px}
.feed-actions button{
  background:none;border:none;color:var(--text-3);font-size:.8rem;
  display:flex;align-items:center;gap:4px;cursor:pointer;padding:4px 0;
}
.feed-actions button.liked{color:var(--rose)}
.comment-list{margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
.comment{font-size:.82rem;margin-bottom:6px}
.comment b{color:var(--text);font-weight:600}
.comment-input{
  display:flex;gap:8px;margin-top:8px;
}
.comment-input input{
  flex:1;background:var(--elevated);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:8px 12px;font-size:.85rem;outline:none;
}
.comment-input input:focus{border-color:var(--emerald)}
.comment-input button{
  background:var(--emerald);color:#0F1117;border:none;border-radius:var(--r-sm);
  padding:8px 14px;font-weight:600;font-size:.85rem;cursor:pointer;flex-shrink:0;
}

/* ── AI Coach ───────────────────────────────── */
.chat-messages{flex:1;overflow-y:auto;padding-bottom:12px}
.chat-msg{margin-bottom:12px;max-width:85%;animation:fadeUp .2s var(--ease)}
.chat-msg.user{margin-left:auto}
.chat-bubble{
  padding:12px 16px;border-radius:16px;font-size:.9rem;line-height:1.5;
  word-wrap:break-word;
}
.chat-msg.user .chat-bubble{background:var(--emerald);color:#0F1117;border-bottom-right-radius:4px}
.chat-msg.assistant .chat-bubble{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--text)}
.chat-input{
  display:flex;gap:8px;padding:12px 0;border-top:1px solid var(--border);
  position:sticky;bottom:0;background:var(--bg);
}
.chat-input input{
  flex:1;background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:12px 18px;font-size:.9rem;outline:none;
}
.chat-input input:focus{border-color:var(--emerald)}
.chat-input button{
  background:var(--emerald);color:#0F1117;border:none;border-radius:50%;
  width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;font-size:1.1rem;
}

/* ── Profile ────────────────────────────────── */
.profile-header{text-align:center;margin-bottom:20px}
.profile-avatar{
  width:64px;height:64px;border-radius:50%;background:var(--emerald-d);
  display:flex;align-items:center;justify-content:center;margin:0 auto 10px;
  font-size:1.5rem;font-weight:700;color:var(--emerald);
}
.profile-name{font-family:var(--font-d);font-weight:700;font-size:1.2rem}
.profile-email{font-size:.85rem;color:var(--text-2);margin-top:2px}
.settings-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 0;border-bottom:1px solid var(--border);
}
.settings-row:last-child{border-bottom:none}
.settings-label{font-size:.9rem;font-weight:500}
.settings-value{font-size:.85rem;color:var(--text-2)}

/* ── Sub-tabs (Profile sections) ────────────── */
.sub-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:14px;-webkit-overflow-scrolling:touch}
.sub-tabs::-webkit-scrollbar{display:none}
.sub-tab{
  flex-shrink:0;padding:7px 14px;border-radius:20px;border:1px solid var(--border);
  background:var(--card);color:var(--text-2);font-size:.78rem;font-weight:600;
  cursor:pointer;white-space:nowrap;transition:all .15s;
}
.sub-tab.active{background:var(--emerald);color:#0F1117;border-color:var(--emerald)}

/* ── Gauge / Progress ───────────────────────── */
.gauge-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.gauge-bar{flex:1;height:8px;background:var(--elevated);border-radius:4px;overflow:hidden}
.gauge-fill{height:100%;border-radius:4px;transition:width .4s var(--ease)}
.grade-badge{
  display:inline-block;font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:4px;
  margin-left:6px;
}

/* ── HYROX ──────────────────────────────────── */
.hyrox-station{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 0;border-bottom:1px solid var(--border);
}
.hyrox-station:last-child{border-bottom:none}
.hyrox-name{font-size:.85rem;font-weight:500}
.hyrox-time{font-family:var(--font-m);font-size:.9rem;font-weight:600}

/* ── Admin ──────────────────────────────────── */
.admin-user{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:14px;margin-bottom:10px;
}
.admin-name{font-weight:600;font-size:.9rem;display:flex;align-items:center;gap:8px}
.admin-badge{
  font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:4px;text-transform:uppercase;
}
.admin-badge.approved{background:var(--emerald-d);color:var(--emerald)}
.admin-badge.pending{background:var(--amber-d);color:var(--amber)}
.admin-badge.rejected{background:var(--rose-d);color:var(--rose)}
.admin-badge.admin{background:var(--sky-d);color:var(--sky)}
.admin-meta{font-size:.78rem;color:var(--text-2);margin-top:4px}
.admin-actions{display:flex;gap:8px;margin-top:10px}
.admin-actions button{
  flex:1;padding:8px;border-radius:var(--r-sm);border:none;
  font-weight:600;font-size:.8rem;cursor:pointer;
}

/* ── Loading & Empty ────────────────────────── */
.loading{display:flex;justify-content:center;padding:40px 0}
.spinner{
  width:28px;height:28px;border:3px solid var(--border);
  border-top-color:var(--emerald);border-radius:50%;
  animation:spin .6s linear infinite;
}
.empty{text-align:center;padding:40px 0;color:var(--text-3);font-size:.9rem}

/* ── Animations ─────────────────────────────── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeUp .25s var(--ease)}

/* ── Modal / Sheet ──────────────────────────── */
.sheet-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;
  opacity:0;transition:opacity .2s;pointer-events:none;
}
.sheet-overlay.open{opacity:1;pointer-events:auto}
.sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:201;
  background:var(--surface);border-radius:16px 16px 0 0;
  padding:20px 16px calc(20px + var(--safe-b));
  transform:translateY(100%);transition:transform .3s var(--ease);
  max-height:85dvh;overflow-y:auto;
}
.sheet-overlay.open .sheet{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--text-3);margin:0 auto 16px}

/* ── Activity Detail Grid ───────────────────── */
.detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.detail-item{text-align:center;padding:10px 4px;background:var(--elevated);border-radius:var(--r-sm)}
.detail-item .d-val{font-family:var(--font-m);font-size:.9rem;font-weight:600}
.detail-item .d-lbl{font-size:.65rem;color:var(--text-3);margin-top:2px;text-transform:uppercase}

/* ── Plan Header ────────────────────────────── */
.plan-header{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px}
.plan-title{font-family:var(--font-d);font-weight:700;font-size:1.1rem;margin-bottom:4px}
.plan-meta{font-size:.8rem;color:var(--text-2);margin-bottom:8px}
.pace-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.pace-item{font-size:.78rem;display:flex;justify-content:space-between;padding:6px 10px;background:var(--elevated);border-radius:var(--r-sm)}
.pace-label{color:var(--text-2)}
.pace-val{font-family:var(--font-m);font-weight:600;color:var(--emerald)}

/* ── Top Bar Icons ──────────────────────────── */
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.top-bar-icons{display:flex;gap:10px}
.top-bar-icons button{
  background:none;border:none;color:var(--text-3);cursor:pointer;
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;transition:background .15s;
}
.top-bar-icons button:active{background:var(--elevated)}
.top-bar-icons button svg{width:20px;height:20px}

/* ── Training Effect Bar ────────────────────── */
.te-bar{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.te-label{font-size:.75rem;color:var(--text-2);width:70px;flex-shrink:0}
.te-track{flex:1;height:6px;background:var(--elevated);border-radius:3px;overflow:hidden}
.te-fill{height:100%;border-radius:3px;transition:width .3s var(--ease)}
.te-val{font-family:var(--font-m);font-size:.75rem;width:28px;text-align:right}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ═══════════════════════════════════════════════════════
// PaceForge Mobile Web — Single Page Application
// ═══════════════════════════════════════════════════════

const API = '';

// ── State ──────────────────────────────────────────────
const state = {
  jwt: localStorage.getItem('pf_jwt'),
  refresh: localStorage.getItem('pf_refresh'),
  user: JSON.parse(localStorage.getItem('pf_user') || 'null'),
  tab: 'home',
  authPage: 'login',
};

// ── API helpers ────────────────────────────────────────
async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...opts.headers };
  if (state.jwt) headers['Authorization'] = `Bearer ${state.jwt}`;
  const res = await fetch(API + path, { ...opts, headers });
  if (res.status === 401 && state.refresh) {
    const ok = await refreshToken();
    if (ok) {
      headers['Authorization'] = `Bearer ${state.jwt}`;
      return fetch(API + path, { ...opts, headers });
    }
  }
  return res;
}

async function apiJson(path, opts) {
  const res = await api(path, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: res.statusText }));
    throw new Error(err.detail || 'Request failed');
  }
  return res.json();
}

async function refreshToken() {
  try {
    const res = await fetch(API + '/auth/refresh', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh_token: state.refresh }),
    });
    if (!res.ok) throw new Error();
    const data = await res.json();
    state.jwt = data.access_token;
    state.refresh = data.refresh_token;
    localStorage.setItem('pf_jwt', state.jwt);
    localStorage.setItem('pf_refresh', state.refresh);
    return true;
  } catch { logout(); return false; }
}

function logout() {
  state.jwt = null; state.refresh = null; state.user = null;
  localStorage.removeItem('pf_jwt');
  localStorage.removeItem('pf_refresh');
  localStorage.removeItem('pf_user');
  render();
}

// ── SVG Icons ──────────────────────────────────────────
const icons = {
  home: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"/></svg>`,
  profile: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,

// ── Data caches ────────────────────────────────────────
const cache = {};

async function cached(key, fetcher, ttl = 60000) {
  if (cache[key] && Date.now() - cache[key].t < ttl) return cache[key].v;
  const v = await fetcher();
  if (v !== null && v !== undefined) cache[key] = { v, t: Date.now() };
  return v;
}

function clearCache(prefix) {
  for (const k of Object.keys(cache)) { if (k.startsWith(prefix)) delete cache[k]; }
}

}

function bindAuth() {
  const msg = (html, type='error') => {
    const el = document.getElementById('auth-msg');
    if (el) el.innerHTML = `<div class="${type}-msg">${html}</div>`;
  };

  on('login-btn', 'click', async () => {
    const email = val('login-email'), pw = val('login-pw');
    if (!email || !pw) return msg('Please fill in all fields');
    disableBtn('login-btn');
    try {
      const data = await apiJson('/auth/login', { method: 'POST', body: JSON.stringify({ email, password: pw }) });
      state.jwt = data.access_token;
      state.refresh = data.refresh_token;
      state.user = { name: data.name, email: data.email, role: data.role };
      localStorage.setItem('pf_jwt', state.jwt);
      localStorage.setItem('pf_refresh', state.refresh);
      localStorage.setItem('pf_user', JSON.stringify(state.user));
      render();
    } catch (e) { msg(e.message); enableBtn('login-btn', 'Sign In'); }
  });

  on('reg-btn', 'click', async () => {
    const name = val('reg-name'), email = val('reg-email'), pw = val('reg-pw'), pw2 = val('reg-pw2'), reason = val('reg-reason');
    if (!name || !email || !pw) return msg('All fields except reason are required');
    if (pw.length < 8) return msg('Password must be at least 8 characters');
    if (pw !== pw2) return msg('Passwords do not match');
    disableBtn('reg-btn');
    try {
      await apiJson('/auth/register', { method: 'POST', body: JSON.stringify({ name, email, password: pw, reason }) });
      msg('Registration submitted! An admin will review your request.', 'success');
    } catch (e) { msg(e.message); enableBtn('reg-btn', 'Create Account'); }
  });

  on('forgot-btn', 'click', async () => {
    const email = val('forgot-email');
    if (!email) return msg('Please enter your email');
    disableBtn('forgot-btn');
    try {
      await apiJson('/auth/forgot-password', { method: 'POST', body: JSON.stringify({ email }) });
      msg('If that email is registered, a reset link has been sent.', 'success');
    } catch (e) { msg(e.message); enableBtn('forgot-btn', 'Send Reset Link'); }
  });

  on('to-login', 'click', () => { state.authPage = 'login'; render(); });
  on('to-register', 'click', () => { state.authPage = 'register'; render(); });
  on('to-forgot', 'click', () => { state.authPage = 'forgot'; render(); });

  const params = new URLSearchParams(location.search);
  const resetToken = params.get('reset_token');
  if (resetToken) showResetSheet(resetToken);
}

function showResetSheet(token) {
  document.body.insertAdjacentHTML('beforeend', `
    <div class="sheet-overlay open" id="reset-overlay">
      <div class="sheet">
        <div class="sheet-handle"></div>
        <h2 style="font-family:var(--font-d);font-weight:700;margin-bottom:16px">Reset Password</h2>
        <div id="reset-msg"></div>
        <div class="field"><label>New Password (min 8 chars)</label><input id="reset-pw" type="password"></div>
        <div class="field"><label>Confirm New Password</label><input id="reset-pw2" type="password"></div>
        <button class="btn btn-primary" id="reset-btn">Reset Password</button>
      </div>
    </div>`);

  on('reset-btn', 'click', async () => {
    const pw = val('reset-pw'), pw2 = val('reset-pw2');
    const msgEl = document.getElementById('reset-msg');
    if (!pw || pw.length < 8) { msgEl.innerHTML = '<div class="error-msg">Password must be at least 8 characters</div>'; return; }
    if (pw !== pw2) { msgEl.innerHTML = '<div class="error-msg">Passwords do not match</div>'; return; }
    disableBtn('reset-btn');
    try {
      await apiJson('/auth/reset-password', { method: 'POST', body: JSON.stringify({ token, new_password: pw }) });
      msgEl.innerHTML = '<div class="success-msg">Password has been reset! You can now sign in.</div>';
      history.replaceState(null, '', location.pathname);
      setTimeout(() => { document.getElementById('reset-overlay')?.remove(); }, 2000);
    } catch (e) { msgEl.innerHTML = `<div class="error-msg">${escHtml(e.message)}</div>`; enableBtn('reset-btn', 'Reset Password'); }
  });

  on('reset-overlay', 'click', (e) => {
    if (e.target.id === 'reset-overlay') { e.target.remove(); history.replaceState(null, '', location.pathname); }
  });
}

function renderApp() {
  const tabs = [
    ['home', 'Home', icons.home],
    ['fitness', 'Profile', icons.profile],
    ['plan', 'Plan', icons.plan],
    ['calendar', 'Calendar', icons.calendar],
    ['coach', 'Coach', icons.coach],
  ];
  return `
    <div class="page" id="page-content"></div>
    <div class="tab-bar">
      ${tabs.map(([id, label, icon]) =>
        `<button data-tab="${id}" class="${state.tab === id ? 'active' : ''}">${icon}<span>${label}</span></button>`
      ).join('')}
    </div>`;
}

function bindApp() {
  document.querySelectorAll('.tab-bar button').forEach(btn => {
    btn.addEventListener('click', () => {
      state.tab = btn.dataset.tab;
      document.querySelectorAll('.tab-bar button').forEach(b => b.classList.toggle('active', b.dataset.tab === state.tab));
      loadTab(state.tab);
    });
  });
}

async function loadTab(tab) {
  const page = document.getElementById('page-content');
  if (!page) return;
  page.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    switch (tab) {
      case 'home': await renderHome(page); break;
      case 'fitness': await renderFitness(page); break;
      case 'plan': await renderPlan(page); break;
      case 'calendar': await renderCalendar(page); break;
      case 'coach': renderCoach(page); break;
      case 'settings': await renderSettings(page); break;
      case 'admin': await renderAdminPage(page); break;
      case 'hyrox': await renderHyroxPage(page); break;
      default: page.innerHTML = '<div class="empty">Coming soon</div>';
    }
  } catch (e) {
    page.innerHTML = `<div class="empty">Failed to load: ${escHtml(e.message)}</div>`;
  }
}

      ${metricCard('VO₂max', aero.vo2max_category || '—', aero.cardiac_efficiency ? 'Cardiac: ' + aero.cardiac_efficiency : '')}
      ${metricCard('Status', snap.training_status || '—', loadRec.fatigue_risk ? 'Fatigue: ' + loadRec.fatigue_risk : '')}
      ${metricCard('Battery', loadRec.body_battery != null ? loadRec.body_battery : '—', loadRec.stress_level ? 'Stress: ' + loadRec.stress_level : '')}

function renderFeedItem(ev) {
  const initials = (ev.user_name || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  const timeAgo = formatTimeAgo(ev.created_at);
  const likeCount = ev.like_count || 0;
  const commentCount = ev.comment_count || 0;
  const isLiked = ev.user_liked;

  // Show metadata for activity events
  let metaHtml = '';
  let descHtml = '';
  let splitsHtml = '';
  if (ev.metadata) {
    const m = ev.metadata;

    // Metrics cards strip (compact)
    const cards = [];
    if (m.distance_km || m.distance_meters) {
      const d = m.distance_km || (m.distance_meters / 1000);
      cards.push(['Distance', d.toFixed(1), 'km']);
    }
    if (m.duration_seconds) {
      const dm = Math.floor(m.duration_seconds / 60);
      const ds = Math.round(m.duration_seconds % 60);
      cards.push(['Duration', `${dm}:${String(ds).padStart(2,'0')}`, '']);
    }
    if (m.pace || m.avg_pace_sec_per_km) {
      const p = m.avg_pace_sec_per_km || 0;
      cards.push(['Pace', p ? formatPace(p) : m.pace.replace('/km',''), '/km']);
    }
    if (m.avg_hr) cards.push(['Avg HR', Math.round(m.avg_hr), 'bpm']);
    if (m.calories) cards.push(['Calories', Math.round(m.calories), '']);
    if (m.elevation_gain && m.elevation_gain > 0) cards.push(['Elevation', Math.round(m.elevation_gain) + 'm', '']);
    if (m.training_effect_aerobic) cards.push(['Aerobic TE', m.training_effect_aerobic.toFixed(1), '']);
    if (cards.length) {
      metaHtml = `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">${cards.map(([l,v,u]) =>
        `<div style="flex:1;min-width:70px;text-align:center;padding:6px 4px;background:var(--elevated);border-radius:6px">
          <div style="font-family:var(--font-m);font-size:.82rem;font-weight:600">${v}<span style="font-size:.65rem;color:var(--text-3);font-weight:400">${u}</span></div>
          <div style="font-size:.6rem;color:var(--text-3);text-transform:uppercase;margin-top:1px">${l}</div>
        </div>`).join('')}</div>`;
    }

    // Planned workout description
    if (m.description) {
      const purposeBadge = m.purpose
        ? `<span style="display:inline-block;background:var(--emerald-a);color:var(--emerald);font-size:.65rem;padding:1px 6px;border-radius:8px;margin-right:5px;text-transform:uppercase;font-weight:600">${m.purpose.replace(/_/g,' ')}</span>`
        : '';
      descHtml = `<div style="color:var(--text-3);font-size:.78rem;font-style:italic;margin-top:6px;padding:6px 8px;background:var(--elevated);border-radius:6px;border-left:2px solid var(--emerald-a)">${purposeBadge}${escHtml(m.description)}</div>`;
    }

    // Pace analysis — Garmin-style smooth bezier area chart
    if (m.splits && m.splits.length > 1) {
      const valid = m.splits.filter(s => s.pace_sec);
      if (valid.length > 1) {
        const paces = valid.map(s => s.pace_sec);
        const minP = Math.min(...paces);
        const maxP = Math.max(...paces);
        const avgP = paces.reduce((a,b) => a+b, 0) / paces.length;
        const range = maxP - minP || 1;
        const W = 340, H = 95;
        const pl = 6, pr = 68, pt = 8, pb = 16;
        const pw = W - pl - pr, ph = H - pt - pb;
        const n = valid.length;
        const points = valid.map((s, i) => {
          const x = pl + (i / Math.max(n - 1, 1)) * pw;
          const y = pt + ((s.pace_sec - minP) / range) * ph;
          return { x, y, pace: s.pace_sec, km: s.km };
        });
        // Cubic bezier path
        let path = `M${points[0].x.toFixed(1)},${points[0].y.toFixed(1)}`;
        for (let i = 1; i < points.length; i++) {
          const mx = (points[i-1].x + points[i].x) / 2;
          path += ` C${mx.toFixed(1)},${points[i-1].y.toFixed(1)} ${mx.toFixed(1)},${points[i].y.toFixed(1)} ${points[i].x.toFixed(1)},${points[i].y.toFixed(1)}`;
        }
        const area = path + ` L${points[points.length-1].x.toFixed(1)},${pt+ph} L${points[0].x.toFixed(1)},${pt+ph} Z`;
        const avgY = pt + ((avgP - minP) / range) * ph;
        const fastY = pt, slowY = pt + ph;
        const rx = W - pr + 6;
        const fmt = sec => { const m = Math.floor(sec/60); const s = Math.round(sec%60); return `${m}:${String(s).padStart(2,'0')}`; };
        // X-axis km labels
        let xLabels = '';
        const kmStep = Math.max(1, Math.floor(n / 5));
        points.forEach((p, i) => {
          if (i % kmStep === 0 || i === points.length - 1)
            xLabels += `<text x="${p.x.toFixed(0)}" y="${H-1}" fill="var(--text-3)" font-size="7" text-anchor="middle">${p.km}</text>`;
        });
        splitsHtml = `<div style="margin-top:8px">
          <div style="font-size:.65rem;color:var(--text-3);text-transform:uppercase;font-weight:600;margin-bottom:3px">Pace Analysis</div>
          <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;font-family:var(--font-m)">
            <defs><linearGradient id="pg-${ev.id}" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="var(--sky)" stop-opacity="0.35"/>
              <stop offset="100%" stop-color="var(--sky)" stop-opacity="0.03"/>
            </linearGradient></defs>
            <line x1="${pl}" y1="${fastY}" x2="${W-pr}" y2="${fastY}" stroke="var(--border)" stroke-width="0.5"/>
            <line x1="${pl}" y1="${slowY}" x2="${W-pr}" y2="${slowY}" stroke="var(--border)" stroke-width="0.5"/>
            <line x1="${pl}" y1="${avgY.toFixed(1)}" x2="${W-pr}" y2="${avgY.toFixed(1)}" stroke="var(--text-3)" stroke-width="0.5" stroke-dasharray="3,3"/>
            <path d="${area}" fill="url(#pg-${ev.id})"/>
            <path d="${path}" fill="none" stroke="var(--sky)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            ${xLabels}
            <text x="${rx}" y="${fastY+4}" fill="var(--sky)" font-size="7.5" font-weight="600">${fmt(minP)}</text>
            <text x="${rx}" y="${fastY+12}" fill="var(--text-3)" font-size="6">Fastest</text>
            <text x="${rx}" y="${avgY+2}" fill="var(--text-2)" font-size="7.5">${fmt(avgP)}</text>
            <text x="${rx}" y="${avgY+10}" fill="var(--text-3)" font-size="6">Average</text>
            <text x="${rx}" y="${slowY-2}" fill="var(--rose)" font-size="7.5" font-weight="600">${fmt(maxP)}</text>
            <text x="${rx}" y="${slowY+6}" fill="var(--text-3)" font-size="6">Slowest</text>
          </svg>
        </div>`;
      }
    }
  }

  return `<div class="feed-item" id="feed-${ev.id}">
    <div class="feed-header">
      <div class="feed-avatar">${initials}</div>
      <div style="flex:1">
        <div class="feed-user">${escHtml(ev.user_name || 'User')}</div>
        <div class="feed-time">${timeAgo}</div>
      </div>
    </div>
    <div class="feed-body"><b>${escHtml(ev.title)}</b>${descHtml}${metaHtml}${splitsHtml}</div>
    <div class="feed-actions">
      <button class="${isLiked ? 'liked' : ''}" data-like="${ev.id}">${icons.heart} <span>${likeCount}</span></button>
      <button data-comments="${ev.id}">${icons.comment} <span>${commentCount}</span></button>
    </div>
    <div id="comments-${ev.id}"></div>
  </div>`;
}

function bindFeedActions(page) {
  page.querySelectorAll('[data-like]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.like;
      try {
        const res = await apiJson(`/feed/${id}/like`, { method: 'POST' });
        const span = btn.querySelector('span');
        if (res.liked) { btn.classList.add('liked'); span.textContent = +span.textContent + 1; }
        else { btn.classList.remove('liked'); span.textContent = Math.max(0, +span.textContent - 1); }
      } catch {}
    });
  });

  page.querySelectorAll('[data-comments]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.comments;
      const container = document.getElementById(`comments-${id}`);
      if (container.innerHTML) { container.innerHTML = ''; return; }
      try {
        const comments = await apiJson(`/feed/${id}/comments`);
        let ch = '<div class="comment-list">';
        for (const c of comments || []) {
          ch += `<div class="comment"><b>${escHtml(c.user_name || 'User')}:</b> ${escHtml(c.body)}</div>`;
        }
        ch += `<div class="comment-input">
          <input placeholder="Add a comment..." id="ci-${id}">
          <button data-send-comment="${id}">Send</button>
        </div></div>`;
        container.innerHTML = ch;
        const sendBtn = container.querySelector(`[data-send-comment="${id}"]`);
        sendBtn?.addEventListener('click', async () => {
          const input = document.getElementById(`ci-${id}`);
          const body = input.value.trim();
          if (!body) return;
          await apiJson(`/feed/${id}/comment`, { method: 'POST', body: JSON.stringify({ body }) });
          input.value = '';
          clearCache('feed');
          const count = btn.querySelector('span');
          count.textContent = +count.textContent + 1;
          const updated = await apiJson(`/feed/${id}/comments`);
          let uch = '';
          for (const c of updated || []) { uch += `<div class="comment"><b>${escHtml(c.user_name || 'User')}:</b> ${escHtml(c.body)}</div>`; }
          container.innerHTML = `<div class="comment-list">${uch}<div class="comment-input"><input placeholder="Add a comment..." id="ci-${id}"><button data-send-comment="${id}">Send</button></div></div>`;
        });
      } catch {}
    });
  });
}

async function renderFitness(page) {
  const analytics = await cached('analytics', () => apiJson('/profile/analytics').catch(() => null));
  if (!analytics) {
    page.innerHTML = '<div class="fade-in"><div class="section-title">Fitness Profile</div><div class="empty">No data. Sync from Garmin first.</div></div>';
    return;
  }

  const subTabs = [
    ['snapshot', 'Snapshot'],
    ['aerobic', 'Aerobic'],
    ['economy', 'Economy'],
    ['load', 'Load'],
    ['races', 'Races'],
    ['training', 'Training'],
    ['hyrox_p', 'HYROX'],
  ];

  let activeSub = 'snapshot';

  function drawFitness() {
    let html = `<div class="fade-in">
      <div class="section-title">Fitness Profile</div>
      <div class="sub-tabs">
        ${subTabs.map(([id, label]) => `<button class="sub-tab ${activeSub === id ? 'active' : ''}" data-sub="${id}">${label}</button>`).join('')}
      </div>
      <div id="fitness-content"></div>
    </div>`;
    page.innerHTML = html;

    page.querySelectorAll('.sub-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        activeSub = btn.dataset.sub;
        page.querySelectorAll('.sub-tab').forEach(b => b.classList.toggle('active', b.dataset.sub === activeSub));
        drawSubContent();
      });
    });
    drawSubContent();
  }

  function drawSubContent() {
    const el = document.getElementById('fitness-content');
    if (!el) return;
    switch (activeSub) {
      case 'snapshot': el.innerHTML = renderSnapshot(analytics); break;
      case 'aerobic': el.innerHTML = renderAerobic(analytics); break;
      case 'economy': el.innerHTML = renderEconomy(analytics); break;
      case 'load': el.innerHTML = renderLoadRecovery(analytics); break;
      case 'races': el.innerHTML = renderRaces(analytics); break;
      case 'training': el.innerHTML = renderTraining(analytics); break;
      case 'hyrox_p': el.innerHTML = renderHyroxProfile(analytics); break;
    }
  }

  drawFitness();
}

async function renderPlan(page) {
  const plans = await cached('plans', () => apiJson('/plans').catch(() => []));
  const active = plans.find(p => p.accepted);

  if (!active) {
    page.innerHTML = `<div class="fade-in">
      <div class="section-title">Training Plan</div>
      <div style="margin:16px 0;padding:14px 16px;background:#F59E0B18;border:1px solid #F59E0B44;border-radius:10px;display:flex;align-items:center;gap:10px">
        <span style="font-size:1.3rem">💻</span>
        <div>
          <div style="font-weight:600;font-size:.88rem;color:var(--text-1)">No plan created yet</div>
          <div style="font-size:.78rem;color:var(--text-2);margin-top:2px">Plan creation is available on the desktop website. Head there to generate your training plan!</div>
        </div>
      </div>
    </div>`;
    return;
  }

  const weeks = active.weeks || [];
  let currentWeek = 0;
  const today = new Date().toISOString().slice(0, 10);
  weeks.forEach((w, i) => {
    const wDates = (w.workouts || []).map(x => x.scheduled_date).filter(Boolean);
    if (wDates.some(d => d >= today)) currentWeek = currentWeek || i;
  });

  // Plan header with full details
  let html = `<div class="fade-in">
    <div class="plan-header">
      <div class="plan-title">${escHtml(active.name || 'Training Plan')}</div>
      <div class="plan-meta">
        ${active.goal_type || ''} ${active.target_date ? '· Target: ' + active.target_date : ''}
        ${active.target_time_seconds ? '· Goal: ' + formatSeconds(active.target_time_seconds) : ''}
        ${active.total_weeks ? '· ' + active.total_weeks + ' weeks' : ''}
      </div>
      ${active.created_at ? `<div style="font-size:.75rem;color:var(--text-3)">Created ${active.created_at}${active.pace_source ? ' · Paces from ' + active.pace_source : ''}</div>` : ''}
      ${active.vdot ? `<div style="font-size:.78rem;color:var(--text-2);margin-top:6px">VDOT: <span style="font-family:var(--font-m);color:var(--emerald)">${active.vdot.toFixed(1)}</span></div>` : ''}

      <div class="pace-grid">
        ${paceItem('Easy', active.easy_pace)}
        ${paceItem('Marathon', active.marathon_pace)}
        ${paceItem('Threshold', active.threshold_pace)}
        ${paceItem('Interval', active.interval_pace)}
        ${paceItem('Repetition', active.repetition_pace)}
      </div>
    </div>`;

  // Rationale
  if (active.rationale) {
    html += `<div class="card">
      <div style="font-weight:600;font-size:.85rem;margin-bottom:6px">Plan Rationale</div>
      <div style="font-size:.82rem;color:var(--text-2);line-height:1.5">${escHtml(active.rationale)}</div>
    </div>`;
  }

  // Tips
  if (active.tips && active.tips.length) {
    html += `<div class="card">
      <div style="font-weight:600;font-size:.85rem;margin-bottom:6px">Tips</div>
      ${active.tips.map(t => `<div style="font-size:.82rem;color:var(--text-2);padding:3px 0">• ${escHtml(t)}</div>`).join('')}
    </div>`;
  }

  // Athlete summary
  if (active.athlete_summary) {
    html += `<div class="card">
      <div style="font-weight:600;font-size:.85rem;margin-bottom:6px">Athlete Summary</div>
      <div style="font-size:.82rem;color:var(--text-2);line-height:1.5">${escHtml(active.athlete_summary)}</div>
    </div>`;
  }

  // Week selector
  html += `<div class="week-nav" id="week-nav">
    ${weeks.map((w, i) => {
      const phaseLabel = w.phase ? ` · ${w.phase}` : '';
      return `<button class="week-btn ${i === currentWeek ? 'active' : ''}" data-week="${i}" title="${w.focus || ''}">W${i + 1}${phaseLabel}</button>`;
    }).join('')}
  </div>
  <div id="week-info"></div>
  <div id="week-content"></div>
  </div>`;

  page.innerHTML = html;

  function renderWeekContent(wi) {
    const w = weeks[wi];
    if (!w) return;

    // Week info
    const infoEl = document.getElementById('week-info');
    if (infoEl) {
      let info = '';
      if (w.phase || w.focus || w.total_distance_km) {
        info = `<div class="card" style="padding:12px">
          <div style="font-size:.82rem;color:var(--text-2)">
            ${w.phase ? `<b>${w.phase}</b>` : ''} ${w.focus ? '· ' + escHtml(w.focus) : ''}
            ${w.total_distance_km ? ` · ${w.total_distance_km.toFixed(0)} km total` : ''}
          </div>
        </div>`;
      }
      infoEl.innerHTML = info;
    }

    // Workouts
    const contentEl = document.getElementById('week-content');
    if (!contentEl) return;
    let whtml = '';
    for (const wo of w.workouts || []) {
      const typeColors = { easy_run: 'var(--emerald)', tempo: 'var(--amber)', long_run: 'var(--sky)', intervals: 'var(--rose)', speed: 'var(--rose)', threshold: 'var(--amber)', recovery_run: 'var(--text-3)', rest: 'var(--text-3)', race_pace: 'var(--violet)', fartlek: 'var(--sky)', hyrox_mixed: 'var(--violet)', cross_training: 'var(--text-2)' };
      const color = typeColors[wo.workout_type] || 'var(--text-2)';
      const dist = wo.estimated_distance_meters ? (wo.estimated_distance_meters / 1000).toFixed(1) + ' km' : '';
      const dur = wo.estimated_duration_seconds ? Math.round(wo.estimated_duration_seconds / 60) + ' min' : '';
      const badge = wo.completed ? `<span class="wo-badge" style="background:var(--emerald-d);color:var(--emerald)">Done</span>` : '';
      whtml += `<div class="workout-card" data-wo='${JSON.stringify(wo).replace(/'/g, "&#39;")}'>
        <div class="wo-bar" style="background:${color}"></div>
        <div class="wo-info">
          <div class="wo-name">${escHtml(wo.name || 'Workout')}</div>
          <div class="wo-meta">${wo.scheduled_date || ''} ${dist ? '· ' + dist : ''} ${dur ? '· ~' + dur : ''}</div>
          ${wo.purpose ? `<div class="wo-meta" style="color:var(--text-3)">${wo.purpose.replace(/_/g, ' ')}</div>` : ''}
        </div>
        ${badge}
      </div>`;
    }
    contentEl.innerHTML = whtml;
    bindWorkoutCards();
  }

  // Scroll to active week
  const activeBtn = page.querySelector('.week-btn.active');
  if (activeBtn) activeBtn.scrollIntoView({ inline: 'center', block: 'nearest' });

  page.querySelectorAll('.week-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      page.querySelectorAll('.week-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderWeekContent(+btn.dataset.week);
    });
  });

  renderWeekContent(currentWeek);
}

function paceItem(label, secPerKm) {
  if (!secPerKm) return '';
  return `<div class="pace-item"><span class="pace-label">${label}</span><span class="pace-val">${formatPace(secPerKm)}/km</span></div>`;
}

function bindWorkoutCards() {
  document.querySelectorAll('.workout-card[data-wo]').forEach(card => {
    card.addEventListener('click', () => {
      try { showWorkoutSheet(JSON.parse(card.dataset.wo)); } catch {}
    });
  });
}

function showWorkoutSheet(wo) {
  const dist = wo.estimated_distance_meters ? (wo.estimated_distance_meters / 1000).toFixed(1) + ' km' : '';
  const dur = wo.estimated_duration_seconds ? Math.round(wo.estimated_duration_seconds / 60) + ' min' : '';

  let stepsHtml = '';
  if (wo.steps && wo.steps.length) {
    stepsHtml = `<div style="margin-top:12px"><div style="font-weight:600;font-size:.85rem;margin-bottom:8px">Steps</div>`;
    for (const s of wo.steps) {
      stepsHtml += `<div style="padding:8px 12px;background:var(--elevated);border-radius:var(--r-sm);margin-bottom:6px;font-size:.82rem">
        <div style="font-weight:500">${escHtml(s.description || s.type || 'Step')}</div>
        ${s.duration ? `<div style="color:var(--text-2);margin-top:2px">${s.duration}</div>` : ''}
        ${s.target_pace ? `<div style="color:var(--emerald);margin-top:2px">Pace: ${s.target_pace}</div>` : ''}
        ${s.target_hr ? `<div style="color:var(--sky);margin-top:2px">HR: ${s.target_hr}</div>` : ''}
      </div>`;
    }
    stepsHtml += '</div>';
  }

  // Completion metrics
  let metricsHtml = '';
  if (wo.completed && wo.completion_metrics) {
    const cm = wo.completion_metrics;
    metricsHtml = `<div style="margin-top:12px">
      <div style="font-weight:600;font-size:.85rem;margin-bottom:8px">Completion Data</div>
      <div class="detail-grid">
        ${detailItem(cm.distance_meters ? (cm.distance_meters / 1000).toFixed(2) : '—', 'Distance')}
        ${detailItem(cm.duration_seconds ? formatSeconds(cm.duration_seconds) : '—', 'Duration')}
        ${detailItem(cm.avg_pace_sec_per_km ? formatPace(cm.avg_pace_sec_per_km) : '—', 'Pace')}
        ${detailItem(cm.avg_hr || '—', 'Avg HR')}
        ${detailItem(cm.max_hr || '—', 'Max HR')}
        ${detailItem(cm.calories || '—', 'Calories')}
      </div>
    </div>`;
  }

  let analysisHtml = '';
  if (wo.completion_analysis) {
    analysisHtml = `<div style="margin-top:8px;font-size:.82rem;color:var(--text-2);line-height:1.4">${escHtml(wo.completion_analysis)}</div>`;
  }

  openSheet(`
    <h3 style="font-family:var(--font-d);font-weight:700;font-size:1.1rem;margin-bottom:4px">${escHtml(wo.name || 'Workout')}</h3>
    <div style="font-size:.82rem;color:var(--text-2);margin-bottom:8px">
      ${wo.workout_type?.replace(/_/g, ' ') || ''} ${dist ? '· ' + dist : ''} ${dur ? '· ~' + dur : ''}
    </div>
    ${wo.description ? `<div style="font-size:.85rem;color:var(--text-2);margin-bottom:8px;line-height:1.4">${escHtml(wo.description)}</div>` : ''}
    ${wo.notes ? `<div style="font-size:.82rem;color:var(--text-3);margin-bottom:8px">${escHtml(wo.notes)}</div>` : ''}
    ${stepsHtml}
    ${metricsHtml}
    ${analysisHtml}
    ${wo.completed ? `<div style="margin-top:12px;font-size:.85rem;color:var(--emerald);font-weight:600">Completed</div>` : ''}
  `);
}

// ═══════════════════════════════════════════════════════
// TAB: CALENDAR (Improved with activity drill-down)
// ═══════════════════════════════════════════════════════
async function renderCalendar(page) {
  const now = new Date();
  let viewYear = now.getFullYear(), viewMonth = now.getMonth();
  const calEntries = {};
  const activityMap = {};

  const [plans, activities] = await Promise.all([
    cached('plans', () => apiJson('/plans').catch(() => [])),
    cached('activities', () => apiJson('/activities?days=240').catch(() => [])),
  ]);

  // Build activity map by date
  for (const act of activities || []) {
    const d = (act.start_time || '').slice(0, 10);
    if (!d) continue;
    const distKm = act.distance_meters ? (act.distance_meters / 1000).toFixed(1) : null;
    const name = act.name || act.activity_type || 'Activity';
    const isRun = (act.activity_type || '').toLowerCase().includes('running');
    let sub = '';
    if (isRun && distKm && act.duration_seconds) {
      const ps = act.duration_seconds / (act.distance_meters / 1000);
      sub = `${distKm} km · ${formatPace(ps)}/km`;
    } else if (distKm) { sub = `${distKm} km`; }
    if (!calEntries[d]) calEntries[d] = [];
    calEntries[d].push({ type: 'activity', title: name, sub, color: isRun ? 'var(--emerald)' : 'var(--violet)', activity: act });
    activityMap[act.activity_id] = act;
  }

  // Plan workouts
  const active = (plans || []).find(p => p.accepted);
  if (active) {
    for (const w of active.weeks || []) {
      for (const wo of w.workouts || []) {
        if (!wo.scheduled_date) continue;
        const d = wo.scheduled_date;
        if (!calEntries[d]) calEntries[d] = [];
        const distKm = wo.estimated_distance_meters ? (wo.estimated_distance_meters / 1000).toFixed(1) + ' km' : '';
        calEntries[d].push({
          type: 'planned', title: (wo.completed ? '✓ ' : '○ ') + (wo.name || 'Workout'),
          sub: [wo.workout_type?.replace(/_/g, ' '), distKm].filter(Boolean).join(' · '),
          color: wo.completed ? 'var(--emerald)' : 'var(--sky)', wo
        });
      }
    }
  }

  function drawMonth() {
    const first = new Date(viewYear, viewMonth, 1);
    const last = new Date(viewYear, viewMonth + 1, 0);
    const startDay = first.getDay();
    const monthName = first.toLocaleString('default', { month: 'long', year: 'numeric' });

    let grid = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => `<div class="cal-day-label">${d}</div>`).join('');

    const prevLast = new Date(viewYear, viewMonth, 0).getDate();
    for (let i = startDay - 1; i >= 0; i--) {
      grid += `<div class="cal-day other-month">${prevLast - i}</div>`;
    }

    for (let d = 1; d <= last.getDate(); d++) {
      const ds = `${viewYear}-${String(viewMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
      const isToday = ds === new Date().toISOString().slice(0, 10);
      const entries = calEntries[ds] || [];
      const dots = entries.slice(0, 3).map(e => `<div class="cal-dot" style="background:${e.color}"></div>`).join('');
      grid += `<div class="cal-day ${isToday ? 'today' : ''}" data-date="${ds}">
        ${d}
        ${dots ? `<div class="cal-dots">${dots}</div>` : ''}
      </div>`;
    }

    const totalCells = startDay + last.getDate();
    const remaining = (7 - totalCells % 7) % 7;
    for (let i = 1; i <= remaining; i++) {
      grid += `<div class="cal-day other-month">${i}</div>`;
    }

    return `<div class="fade-in">
      <div class="cal-header">
        <h3>${monthName}</h3>
        <div class="cal-nav">
          <button id="cal-prev">‹</button>
          <button id="cal-next">›</button>
        </div>
      </div>
      <div class="cal-grid">${grid}</div>
      <div id="cal-details" style="margin-top:12px"></div>
    </div>`;
  }

  function reDraw() {
    page.innerHTML = drawMonth();
    page.querySelectorAll('.cal-day[data-date]').forEach(el => {
      el.addEventListener('click', () => {
        page.querySelectorAll('.cal-day.selected').forEach(s => s.classList.remove('selected'));
        el.classList.add('selected');
        const entries = calEntries[el.dataset.date] || [];
        const details = document.getElementById('cal-details');
        if (!entries.length) { details.innerHTML = '<div class="empty" style="padding:16px 0">No activities</div>'; return; }
        details.innerHTML = entries.map(e => `
          <div class="cal-entry" data-entry-type="${e.type}" data-entry='${JSON.stringify(e.activity || e.wo || {}).replace(/'/g, "&#39;")}'>
            <div class="cal-entry-bar" style="background:${e.color}"></div>
            <div class="cal-entry-info">
              <div class="cal-entry-title">${escHtml(e.title)}</div>
              ${e.sub ? `<div class="cal-entry-sub">${e.sub}</div>` : ''}
            </div>
          </div>`).join('');

        details.querySelectorAll('.cal-entry').forEach(c => {
          c.addEventListener('click', () => {
            try {
              const type = c.dataset.entryType;
              const data = JSON.parse(c.dataset.entry);
              if (type === 'activity' && data.activity_id) showActivitySheet(data);
              else if (type === 'planned' && data.name) showWorkoutSheet(data);
            } catch {}
          });
        });
      });
    });
    on('cal-prev', 'click', () => { viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; } reDraw(); });
    on('cal-next', 'click', () => { viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; } reDraw(); });
  }

  reDraw();
}

function showActivitySheet(act) {
  const distKm = act.distance_meters ? (act.distance_meters / 1000).toFixed(2) : '—';
  const duration = act.duration_seconds ? formatSeconds(act.duration_seconds) : '—';
  const pace = act.avg_pace_sec_per_km ? formatPace(act.avg_pace_sec_per_km) + '/km' : '—';

  let metricsHtml = `<div class="detail-grid">
    ${detailItem(distKm, 'Distance km')}
    ${detailItem(duration, 'Duration')}
    ${detailItem(pace, 'Avg Pace')}
    ${detailItem(act.avg_hr || '—', 'Avg HR')}
    ${detailItem(act.max_hr || '—', 'Max HR')}
    ${detailItem(act.calories || '—', 'Calories')}
    ${detailItem(act.avg_running_cadence ? Math.round(act.avg_running_cadence) : '—', 'Cadence')}
    ${detailItem(act.avg_stride_length ? act.avg_stride_length.toFixed(2) + 'm' : '—', 'Stride')}
    ${detailItem(act.avg_ground_contact_time ? Math.round(act.avg_ground_contact_time) + 'ms' : '—', 'GCT')}
    ${detailItem(act.avg_vertical_oscillation ? act.avg_vertical_oscillation.toFixed(1) + 'cm' : '—', 'Vert Osc')}
    ${detailItem(act.avg_power ? Math.round(act.avg_power) + 'W' : '—', 'Power')}
    ${detailItem(act.elevation_gain ? Math.round(act.elevation_gain) + 'm' : '—', 'Elevation')}
  </div>`;

  // Training effects
  let teHtml = '';
  if (act.training_effect_aerobic || act.training_effect_anaerobic) {
    teHtml = `<div style="margin-top:8px">
      <div style="font-weight:600;font-size:.82rem;margin-bottom:6px">Training Effect</div>`;
    if (act.training_effect_aerobic) {
      const pct = Math.min(100, Math.round((act.training_effect_aerobic / 5) * 100));
      teHtml += `<div class="te-bar">
        <span class="te-label">Aerobic</span>
        <div class="te-track"><div class="te-fill" style="width:${pct}%;background:var(--sky)"></div></div>
        <span class="te-val">${act.training_effect_aerobic.toFixed(1)}</span>
      </div>`;
    }
    if (act.training_effect_anaerobic) {
      const pct = Math.min(100, Math.round((act.training_effect_anaerobic / 5) * 100));
      teHtml += `<div class="te-bar">
        <span class="te-label">Anaerobic</span>
        <div class="te-track"><div class="te-fill" style="width:${pct}%;background:var(--rose)"></div></div>
        <span class="te-val">${act.training_effect_anaerobic.toFixed(1)}</span>
      </div>`;
    }
    teHtml += '</div>';
  }

  openSheet(`
    <h3 style="font-family:var(--font-d);font-weight:700;font-size:1.1rem;margin-bottom:4px">${escHtml(act.name || 'Activity')}</h3>
    <div style="font-size:.82rem;color:var(--text-2);margin-bottom:12px">
      ${act.activity_type || ''} · ${act.start_time ? new Date(act.start_time).toLocaleString() : ''}
    </div>
    ${metricsHtml}
    ${teHtml}
  `);
}

// TAB: AI COACH
// ═══════════════════════════════════════════════════════
function renderCoach(page) {
  const messages = cache._chatMsgs || [];
  page.innerHTML = `<div style="display:flex;flex-direction:column;height:calc(100dvh - 88px)">
    <div class="section-title" style="margin-bottom:8px">AI Coach</div>
    <div class="chat-messages" id="chat-msgs">
      ${messages.length ? messages.map(m => `
        <div class="chat-msg ${m.role}">
          <div class="chat-bubble">${m.content}</div>
        </div>`).join('') : '<div class="empty" style="padding:60px 0">Ask me anything about your training</div>'}
    </div>
    <div class="chat-input">
      <input id="chat-in" placeholder="Ask your coach..." enterkeyhint="send">
      <button id="chat-send">${icons.send}</button>
    </div>
  </div>`;

  const scrollToBottom = () => {
    const el = document.getElementById('chat-msgs');
    if (el) el.scrollTop = el.scrollHeight;
  };
  scrollToBottom();

  const sendMsg = async () => {
    const input = document.getElementById('chat-in');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';

    if (!cache._chatMsgs) cache._chatMsgs = [];
    cache._chatMsgs.push({ role: 'user', content: escHtml(text) });

    const msgs = document.getElementById('chat-msgs');
    msgs.innerHTML += `<div class="chat-msg user"><div class="chat-bubble">${escHtml(text)}</div></div>`;
    msgs.innerHTML += `<div class="chat-msg assistant" id="coach-typing"><div class="chat-bubble"><div class="spinner" style="width:18px;height:18px;border-width:2px"></div></div></div>`;
    scrollToBottom();

    try {
      const res = await apiJson('/coach/chat', {
        method: 'POST',
        body: JSON.stringify({ message: text, history: cache._chatMsgs.filter(m => m.role !== 'typing').map(m => ({ role: m.role, content: m.content })) }),
      });
      document.getElementById('coach-typing')?.remove();
      const reply = res.reply || res.message || 'I couldn\'t generate a response.';
      cache._chatMsgs.push({ role: 'assistant', content: reply });
      msgs.innerHTML += `<div class="chat-msg assistant"><div class="chat-bubble">${formatMarkdown(reply)}</div></div>`;
      scrollToBottom();
    } catch (e) {
      document.getElementById('coach-typing')?.remove();
      msgs.innerHTML += `<div class="chat-msg assistant"><div class="chat-bubble" style="color:var(--rose)">Error: ${escHtml(e.message)}</div></div>`;
      scrollToBottom();
    }
  };

  on('chat-send', 'click', sendMsg);
  document.getElementById('chat-in')?.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMsg(); });
}

// HYROX RESULTS PAGE

async function renderHyroxPage(page) {
  page.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const results = await apiJson('/hyrox/results').catch(() => []);
    let html = `<div class="fade-in"><div class="section-title">HYROX Results</div>`;
    if (!results || !results.length) {
      html += '<div class="empty">No HYROX results found. Search from the desktop app.</div>';
    } else {
      for (const race of results) {
        html += `<div class="card">
          <div style="font-weight:600;margin-bottom:8px">${escHtml(race.race_name || 'Race')} — ${race.overall_time || ''}</div>`;
        if (race.stations && race.stations.length) {
          for (const s of race.stations) {
            html += `<div class="hyrox-station"><span class="hyrox-name">${escHtml(s.name || s.station)}</span><span class="hyrox-time">${s.time || ''}</span></div>`;
          }
        }
        html += '</div>';
      }
    }
    html += '<button class="btn-link" style="margin-top:12px" onclick="state.tab=\'settings\';loadTab(\'settings\')">← Back</button></div>';
    page.innerHTML = html;
  } catch (e) { page.innerHTML = `<div class="empty">Failed: ${escHtml(e.message)}</div>`; }
}

// ═══════════════════════════════════════════════════════
// ADMIN PAGE
// ═══════════════════════════════════════════════════════
async function renderAdminPage(page) {
  if (state.user?.role !== 'admin') { page.innerHTML = '<div class="empty">Admin access required</div>'; return; }
  page.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const users = await apiJson('/admin/users');
    let html = `<div class="fade-in"><div class="section-title">Admin — User Management</div>
      <div class="metric-grid" style="margin-bottom:16px">
        ${metricCard('Pending', String(users.filter(u => u.status === 'pending').length), '')}
        ${metricCard('Approved', String(users.filter(u => u.status === 'approved').length), '')}
      </div>`;

    for (const u of users) {
      const badgeCls = u.role === 'admin' ? 'admin' : u.status;
      const badgeLabel = u.role === 'admin' ? 'ADMIN' : u.status.toUpperCase();
      const lastLogin = u.last_login ? u.last_login.slice(0, 16).replace('T', ' ') : 'Never';
      html += `<div class="admin-user">
        <div class="admin-name">${escHtml(u.name)} <span class="admin-badge ${badgeCls}">${badgeLabel}</span></div>
        <div class="admin-meta">${escHtml(u.email)}${u.garmin_email ? ' · Garmin: ' + escHtml(u.garmin_email) : ''}</div>
        <div class="admin-meta">Registered: ${(u.created_at || '').slice(0, 10)} · Last login: ${lastLogin}</div>
        ${u.reason ? `<div class="admin-meta">Reason: ${escHtml(u.reason)}</div>` : ''}
        <div class="admin-actions">
          ${u.status === 'pending' ? `
            <button style="background:var(--emerald);color:#0F1117" data-approve="${u.id}">Approve</button>
            <button style="background:var(--rose-d);color:var(--rose)" data-reject="${u.id}">Reject</button>
          ` : ''}
          ${u.status === 'approved' && u.role !== 'admin' ? `
            <button style="background:var(--rose-d);color:var(--rose)" data-reject="${u.id}">Revoke</button>
          ` : ''}
        </div>
      </div>`;
    }
    html += '<button class="btn-link" style="margin-top:12px" onclick="state.tab=\'home\';document.querySelectorAll(\'.tab-bar button\')[0].click()">← Back</button></div>';
    page.innerHTML = html;

    page.querySelectorAll('[data-approve]').forEach(btn => {
      btn.addEventListener('click', async () => {
        await apiJson(`/admin/users/${btn.dataset.approve}`, { method: 'PATCH', body: JSON.stringify({ status: 'approved' }) });
        clearCache('');
        renderAdminPage(page);
      });
    });
    page.querySelectorAll('[data-reject]').forEach(btn => {
      btn.addEventListener('click', async () => {
        await apiJson(`/admin/users/${btn.dataset.reject}`, { method: 'PATCH', body: JSON.stringify({ status: 'rejected' }) });
        clearCache('');
        renderAdminPage(page);
      });
    });
  } catch (e) { page.innerHTML = `<div class="empty">Failed: ${escHtml(e.message)}</div>`; }
}

// ═══════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════
function on(id, event, handler) { document.getElementById(id)?.addEventListener(event, handler); }
function val(id) { return (document.getElementById(id)?.value || '').trim(); }
function disableBtn(id) { const b = document.getElementById(id); if (b) { b.disabled = true; b.textContent = '...'; } }
function enableBtn(id, text) { const b = document.getElementById(id); if (b) { b.disabled = false; b.textContent = text; } }
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function metricCard(label, value, sub) {
  return `<div class="metric"><div class="metric-label">${label}</div><div class="metric-value">${value}</div>${sub ? `<div class="metric-sub">${sub}</div>` : ''}</div>`;
}

function labelValue(label, value) {
  if (!value) return '';
  return `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:.85rem">
    <span style="color:var(--text-2)">${label}</span>
    <span style="font-weight:500">${value}</span>
  </div>`;
}

function detailItem(value, label) {
  return `<div class="detail-item"><div class="d-val">${value}</div><div class="d-lbl">${label}</div></div>`;
}

function formatPace(secPerKm) {
  if (!secPerKm || secPerKm <= 0) return '—';
  const m = Math.floor(secPerKm / 60);
  const s = Math.round(secPerKm % 60);
  return `${m}:${String(s).padStart(2, '0')}`;
}

function formatSeconds(totalSec) {
  if (!totalSec || totalSec <= 0) return '—';
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = Math.round(totalSec % 60);
  if (h > 0) return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  return `${m}:${String(s).padStart(2, '0')}`;
}

function formatTimeAgo(iso) {
  if (!iso) return '';
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
  return new Date(iso).toLocaleDateString();
}

function formatMarkdown(text) {
  return escHtml(text)
    .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
    .replace(/\n/g, '<br>');
}

function openSheet(content) {
  document.querySelectorAll('.sheet-overlay').forEach(e => e.remove());
  document.body.insertAdjacentHTML('beforeend', `
    <div class="sheet-overlay open" id="sheet-overlay">
      <div class="sheet"><div class="sheet-handle"></div>${content}</div>
    </div>`);
  on('sheet-overlay', 'click', (e) => { if (e.target.id === 'sheet-overlay') e.target.remove(); });
}

// ── Boot ───────────────────────────────────────────────
render();
</script>

</html>
