<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- PaceForge — ascending pace line mark -->
  <!-- Three ascending bars with rhythm, representing pace improvement -->
  <rect x="100" y="320" width="60" height="120" rx="8" fill="#10B981" opacity="0.25"/>
  <rect x="200" y="220" width="60" height="220" rx="8" fill="#10B981" opacity="0.5"/>
  <rect x="300" y="100" width="60" height="340" rx="8" fill="#10B981" opacity="0.85"/>
  <!-- Connecting ascending line — the trajectory -->
  <path d="M130 310 L230 210 L330 90" stroke="#10B981" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Arrow tip -->
  <path d="M318 118 L330 90 L306 96" stroke="#10B981" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Subtle baseline -->
  <line x1="80" y1="450" x2="432" y2="450" stroke="#10B981" stroke-width="3" stroke-linecap="round" opacity="0.15"/>
</svg>
