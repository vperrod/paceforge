name: hyrox

# Find + import the athlete's HYROX races from results.hyrox.com. Dispatched from the
# web UI (same path as Sync): a `search` writes data/hyrox_preview.json (the pick-list
# the browser polls), an `import` writes data/hyrox.json with full splits. The commit
# uses GITHUB_TOKEN, so the user's token only needs the actions:write it already has.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "profile (hyresult import), search (pick-list) or import (full splits)"
        required: true
        default: "profile"
      slug:
        description: "hyresult.com athlete slug, e.g. victor-perez-rodriguez (profile mode)"
        required: false
        default: ""
      name:
        description: "Athlete surname or full name (search/import modes)"
        required: false
        default: ""
      gender:
        description: "M or F"
        required: false
        default: "M"
      firstname:
        description: "First name (optional, sharpens matching)"
        required: false
        default: ""
      urls:
        description: "Comma-separated athlete URLs to import (import mode)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: paceforge-data
  cancel-in-progress: false

jobs:
  hyrox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e .

      - name: Search or import races
        # User-supplied text via env (never inlined into the shell) to avoid injection.
        env:
          MODE: ${{ github.event.inputs.mode }}
          SLUG: ${{ github.event.inputs.slug }}
          NAME: ${{ github.event.inputs.name }}
          GENDER: ${{ github.event.inputs.gender }}
          FIRSTNAME: ${{ github.event.inputs.firstname }}
          URLS: ${{ github.event.inputs.urls }}
        run: |
          if [ "$MODE" = "profile" ]; then
            paceforge hyrox-import-profile "$SLUG" --gender "$GENDER"
          elif [ "$MODE" = "import" ]; then
            paceforge hyrox-import "$NAME" --gender "$GENDER" --firstname "$FIRSTNAME" --urls "$URLS"
          else
            paceforge hyrox-search "$NAME" --gender "$GENDER" --firstname "$FIRSTNAME"
          fi

      - name: Commit
        run: |
          git config user.name "paceforge-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/hyrox.json data/hyrox_preview.json
          git diff --cached --quiet || git commit -m "data: HYROX ${{ github.event.inputs.mode }}"
          git push
