name: save-events

# Persist the Settings "Upcoming events" form to data/events.json. Dispatched from the
# web UI (same path as save-benchmarks) so the user's token only needs actions:write —
# the commit uses GITHUB_TOKEN. The coach reads events.json when adapting the plan.
on:
  workflow_dispatch:
    inputs:
      data:
        description: "Events JSON array"
        required: true

permissions:
  contents: write

concurrency:
  group: paceforge-data
  cancel-in-progress: false

jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write data/events.json (validated)
        env:
          DATA: ${{ github.event.inputs.data }}
        run: |
          mkdir -p data
          # Parse via env (never inline untrusted input) — also validates it's real JSON.
          python3 -c "import json,os; json.dump(json.loads(os.environ['DATA']), open('data/events.json','w'), indent=2)"

      - name: Commit
        run: |
          git config user.name "paceforge-bot"
          git config user.email "bot@paceforge.local"
          git add data/events.json
          git diff --cached --quiet || git commit -m "data: update upcoming events"
          git push
