name: push

# Push a training-plan week's workouts to Garmin Connect. Triggered on demand
# (from the web UI via workflow_dispatch, or manually).
on:
  workflow_dispatch:
    inputs:
      week:
        description: "Plan week number to push (blank = next upcoming week)"
        required: false
        default: ""
      dry_run:
        description: "Preview only, don't push"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: paceforge-push
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e .

      - name: Push plan week to Garmin
        env:
          PACEFORGE_GARMIN_EMAIL: ${{ secrets.PACEFORGE_GARMIN_EMAIL }}
          GARMIN_TOKEN: ${{ secrets.GARMIN_TOKEN }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.week }}" ]; then ARGS="--week ${{ inputs.week }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          paceforge push $ARGS
