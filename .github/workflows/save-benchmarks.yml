name: save-benchmarks

# Persist the Strength-tab benchmark form to data/benchmarks.json. Dispatched from the
# web UI (same path as Sync) so the user's token only needs actions:write — the commit
# itself uses GITHUB_TOKEN. The next pages build folds benchmarks into the assessment.
on:
  workflow_dispatch:
    inputs:
      data:
        description: "Benchmarks JSON object"
        required: true

permissions:
  contents: write

concurrency:
  group: paceforge-data
  cancel-in-progress: false

jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write data/benchmarks.json (validated)
        env:
          DATA: ${{ github.event.inputs.data }}
        run: |
          mkdir -p data
          # Parse via env (never inline untrusted input) — also validates it's real JSON.
          python3 -c "import json,os; json.dump(json.loads(os.environ['DATA']), open('data/benchmarks.json','w'), indent=2)"

      - name: Commit
        run: |
          git config user.name "paceforge-bot"
          git config user.email "bot@paceforge.local"
          git add data/benchmarks.json
          git diff --cached --quiet || git commit -m "data: update strength benchmarks"
          git push
