name: sync

# Pull Garmin metrics + activities into data/*.json. Runs daily and on demand.
on:
  schedule:
    - cron: "0 5 * * *"  # 05:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: paceforge-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e .

      - name: Sync from Garmin
        env:
          PACEFORGE_GARMIN_EMAIL: ${{ secrets.PACEFORGE_GARMIN_EMAIL }}
          GARMIN_TOKEN: ${{ secrets.GARMIN_TOKEN }}
        run: paceforge sync

      - name: Commit data if changed
        run: |
          git config user.name "paceforge-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: daily Garmin sync"
          git push
