name: coach

# Claude as the coach. Three ways in:
#   - weekly cron (Monday) → writes week-review.md
#   - workflow_dispatch → type an instruction ("reschedule Thursday's tempo to Saturday")
#   - a "coach"-labelled GitHub issue → the UI's Generate/adapt button opens one;
#     the issue body is the instruction. Gated to issues opened by the repo owner
#     (the repo is public) so nobody else can drive Claude with write access.
# Runs on your Claude subscription token (CLAUDE_CODE_OAUTH_TOKEN) — no LLM API bill.
on:
  schedule:
    - cron: "0 7 * * 1"  # Monday 07:00 UTC — weekly review
  workflow_dispatch:
    inputs:
      instruction:
        description: "What should the coach do?"
        required: false
        default: "Review last week and write week-review.md."
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write  # claude-code-action mints its GitHub App token via OIDC

concurrency:
  group: paceforge-data
  cancel-in-progress: false

jobs:
  coach:
    # cron + manual always run; issue-triggered only for coach-labelled issues
    # opened by the repo owner (prevents prompt-injection from public users).
    if: >
      github.event_name != 'issues' ||
      (github.event.issue.user.login == github.repository_owner &&
       contains(github.event.issue.labels.*.name, 'coach'))
    runs-on: ubuntu-latest
    env:
      PACEFORGE_GARMIN_EMAIL: ${{ secrets.PACEFORGE_GARMIN_EMAIL }}
      GARMIN_TOKEN: ${{ secrets.GARMIN_TOKEN }}
      # Untrusted-ish text via env (not inlined into the prompt expression).
      COACH_TASK: >-
        ${{ github.event.inputs.instruction
            || github.event.issue.body
            || 'Review last week and write week-review.md.' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e .

      - name: Sync from Garmin
        run: paceforge sync || echo "sync failed — continuing with existing data"

      - name: Run coach
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Use the coach skill in .claude/skills/coach/.
            The athlete's request is in the COACH_TASK environment variable — read it and do it.
            Then run `paceforge validate`, regenerate plan.md if the plan changed, and
            commit any changes to data/, plan.md, and week-review.md.

      - name: Debug — surface the Claude execution result
        if: always()
        run: cat "${RUNNER_TEMP}/claude-execution-output.json" 2>/dev/null | tail -c 4000 || echo "no execution output file"

      - name: Acknowledge the issue
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --body "🤖 Coach run complete — see the latest commits to \`data/\`, \`plan.md\`, and \`week-review.md\`. The site redeploys automatically."
          gh issue close "${{ github.event.issue.number }}"
