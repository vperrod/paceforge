name: analyze

# Auto-write a per-activity coach analysis for every newly completed plan workout,
# right after a sync — so the "automatic for planned workouts" path stays current
# instead of waiting for the weekly coach cron. Runs on your Claude subscription
# token (CLAUDE_CODE_OAUTH_TOKEN); skips the LLM entirely when nothing is pending.
on:
  workflow_run:
    workflows: [sync]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: paceforge-data
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e .

      # Completed + matched workouts that have no data/analyses/{id}.md yet.
      - name: Find unanalysed completed workouts
        id: pending
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os
          plan = json.load(open("data/plan.json"))
          ids = []
          for wk in plan.get("weeks", []):
              for wo in wk.get("workouts", []):
                  if wo.get("completed") and wo.get("matched_activity_ids"):
                      aid = wo["matched_activity_ids"][0]
                      if not os.path.exists(f"data/analyses/{aid}.md"):
                          ids.append(str(aid))
          print(f"count={len(ids)}")
          print("ids=" + ",".join(ids))
          PY

      - name: Write analyses with the coach
        if: steps.pending.outputs.count != '0'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Use the coach skill in .claude/skills/coach/ — the "Per-activity analysis"
            section. Write data/analyses/{id}.md for each of these Garmin activity ids
            that doesn't have one yet: ${{ steps.pending.outputs.ids }}.
            Use data/activities.json, data/details/{id}.json, the matched plan workout
            in data/plan.json, and data/profile.json. Be specific (real pace/HR/distance
            numbers). Then commit the new data/analyses/*.md files.
