name: pages

# Build and deploy the single-user web UI to GitHub Pages. Runs on every push to
# master that touches the app or its data (the daily `sync` job commits data/, which
# triggers a redeploy with fresh numbers), and on demand.
on:
  push:
    branches: [master]
    paths:
      - web/**
      - data/**
      - scripts/build_site_data.py
      - .github/workflows/pages.yml
  # Redeploy after sync/coach commit fresh data. (Their GITHUB_TOKEN pushes don't
  # fire the `push` trigger above, so we react to their completion instead.)
  workflow_run:
    workflows: [sync, coach]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e .

      - name: Precompute derived data (analytics, hyrox, weekly)
        run: python scripts/build_site_data.py

      - name: Assemble _site (app + data)
        run: |
          mkdir -p _site/data
          cp web/index.html _site/index.html
          cp -r data/. _site/data/   # includes details/ + analyses/ subdirs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@v4
