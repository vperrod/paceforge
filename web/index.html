// ═══════════════════════════════════════════════════════
// VIEW: CALENDAR
// ═══════════════════════════════════════════════════════
// Calendar dots are colour-coded by session type so the month reads at a glance:
// green = easy/recovery, blue = long, amber = tempo/threshold, red = fast (intervals/
// speed/hills/fartlek), violet = cross-training/HYROX, grey = rest.
const WO_COLORS = {
  easy_run:'var(--emerald)', recovery_run:'var(--emerald)', easy_with_strides:'var(--emerald)',
  long_run:'var(--sky)', long_run_progressive:'var(--sky)', long_run_with_race_pace:'var(--sky)', progressive:'var(--sky)',
  tempo:'var(--amber)', threshold:'var(--amber)', race_pace:'var(--amber)',
  intervals:'var(--rose)', speed:'var(--rose)', vo2max:'var(--rose)', fartlek:'var(--rose)', hills:'var(--rose)', strides:'var(--rose)',
  cross_training:'var(--violet)', hyrox_mixed:'var(--violet)',
  rest:'var(--text-3)',
};
const colorForWorkout = t => WO_COLORS[t] || 'var(--sky)';

async function renderCalendar(page) {
  const now = new Date();
  let viewYear = now.getFullYear(), viewMonth = now.getMonth();
  const calEntries = {};

  const [plan, activities, events] = await Promise.all([
    planStore.get().catch(() => null),
    cached('activities', () => apiJson('/activities').catch(() => [])),
    loadJSON('events.json').catch(() => []),
  ]);

  for (const ev of events || []) {
    if (!ev.date) continue;
    (calEntries[ev.date] ||= []).push({
      type: 'event', color: 'var(--rose)',
      title: '🏁 ' + (ev.name || ev.type || 'Event'),
      sub: [ev.type, ev.goal_time ? 'goal ' + ev.goal_time : ''].filter(Boolean).join(' · '),
    });
  }

  // Index activities + which ones a plan workout already claims, so a matched run
  // shows as ONE entry (the workout, opening its actual activity) — not two.
  const actById = {};
  for (const act of activities || []) actById[act.activity_id] = act;
  const matchedIds = new Set();
  if (plan && plan.weeks) {
    for (const w of plan.weeks) for (const wo of (w.workouts || [])) (wo.matched_activity_ids || []).forEach(id => matchedIds.add(id));
  }

  for (const act of activities || []) {
    const d = (act.start_time || '').slice(0, 10);
    if (!d || matchedIds.has(act.activity_id)) continue;
    const distKm = act.distance_meters ? (act.distance_meters/1000).toFixed(1) : null;
    const isRun = (act.activity_type || '').toLowerCase().includes('run');
    let sub = '';
    if (isRun && distKm && act.duration_seconds) sub = `${distKm} km · ${formatPace(act.duration_seconds/(act.distance_meters/1000))}/km`;
    else if (distKm) sub = `${distKm} km`;
    (calEntries[d] ||= []).push({ type:'activity', title: act.name || act.activity_type || 'Activity', sub, color: isRun ? 'var(--emerald)' : 'var(--violet)', activity: act });
  }

  const todayISO = new Date().toISOString().slice(0, 10);
  if (plan && plan.accepted) {
    for (const w of plan.weeks || []) {
      for (const wo of w.workouts || []) {
        if (!wo.scheduled_date) continue;
        const matchedAct = (wo.matched_activity_ids || []).map(id => actById[id]).find(Boolean) || null;
        // A past planned workout that wasn't completed is noise next to the actual
        // activities — show planned entries only for today and upcoming days.
        if (!matchedAct && wo.scheduled_date < todayISO) continue;
        const distKm = wo.estimated_distance_meters ? (wo.estimated_distance_meters/1000).toFixed(1) + ' km' : '';
        let sub = [wo.workout_type?.replace(/_/g,' '), distKm].filter(Boolean).join(' · ');
        if (matchedAct && matchedAct.distance_meters && matchedAct.duration_seconds) {
          sub = `${(matchedAct.distance_meters/1000).toFixed(1)} km · ${formatPace(matchedAct.duration_seconds/(matchedAct.distance_meters/1000))}/km`;
        }
        (calEntries[wo.scheduled_date] ||= []).push({
          type: matchedAct ? 'activity' : 'planned',
          title: (wo.completed ? '✓ ' : '○ ') + (wo.name || 'Workout'), sub,
          color: colorForWorkout(wo.workout_type), wo, activity: matchedAct,
        });
      }
    }
  }

  function dayCell(d, ds, todayStr) {
    const entries = calEntries[ds] || [];
    const dots = entries.slice(0, 4).map(e => `<span class="cal-dot" style="background:${e.color}"></span>`).join('');
    return `<div class="cal-day ${ds === todayStr ? 'today' : ''}" data-date="${ds}"><div class="cal-num">${d}</div><div class="cal-dots">${dots}</div></div>`;
  }

  function drawMonth() {
    const first = new Date(viewYear, viewMonth, 1);
    const last = new Date(viewYear, viewMonth + 1, 0);
    const startDay = (first.getDay() + 6) % 7;  // Monday-first: shift Sun(0)→6
    const monthName = first.toLocaleString('default', { month:'long', year:'numeric' });
    let grid = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d => `<div class="cal-day-label">${d}</div>`).join('');
    const prevLast = new Date(viewYear, viewMonth, 0).getDate();
    for (let i = startDay - 1; i >= 0; i--) grid += `<div class="cal-day other-month"><div class="cal-num">${prevLast - i}</div></div>`;
    const todayStr = new Date().toISOString().slice(0,10);
    for (let d = 1; d <= last.getDate(); d++) {
      const ds = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      grid += dayCell(d, ds, todayStr);
    }
    const remaining = (7 - (startDay + last.getDate()) % 7) % 7;
    for (let i = 1; i <= remaining; i++) grid += `<div class="cal-day other-month"><div class="cal-num">${i}</div></div>`;
    return `<div class="fade-in"><div class="dash-grid"><div class="span-5">
      <div class="card">
        <div class="card-h"><div class="card-title">${monthName}</div><div style="display:flex;gap:8px"><button class="btn-icon" id="cal-prev" aria-label="Previous month">‹</button><button class="btn-icon" id="cal-next" aria-label="Next month">›</button></div></div>
        <div class="cal-grid compact">${grid}</div>
      </div></div>
      <div class="span-7"><div class="card" style="height:100%" id="cal-details"><div class="empty" style="border:none;padding:32px 12px">Select a day to see details.</div></div></div>
    </div></div>`;
  }

  // Render the selected day's entry list into the side panel; clicking an entry swaps
  // the panel for that activity/workout's full detail (inline — no popup).
  function showDay(ds) {
    const details = document.getElementById('cal-details');
    const entries = calEntries[ds] || [];
    const dateLabel = new Date(ds + 'T00:00:00').toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });
    if (!entries.length) { details.innerHTML = `<div class="card-h"><div class="card-title" style="font-size:.95rem">${dateLabel}</div></div><div class="empty" style="border:none;padding:24px 0">Nothing scheduled.</div>`; return; }
    details.innerHTML = `<div class="card-h"><div class="card-title" style="font-size:.95rem">${dateLabel}</div></div>` + entries.map((e, i) => `
      <div class="act-item" data-cal-idx="${i}"><div class="act-bar" style="background:${e.color}"></div>
        <div class="act-info"><div class="act-name">${escHtml(e.title)}</div>${e.sub ? `<div class="act-meta">${escHtml(e.sub)}</div>` : ''}</div></div>`).join('');
    details.querySelectorAll('[data-cal-idx]').forEach(c => c.addEventListener('click', () => {
      const e = entries[+c.dataset.calIdx];
      if (e.type === 'activity' && e.activity) renderActivityDetail(details, e.activity, { onBack: () => showDay(ds) });
      else if (e.type === 'planned' && e.wo) renderWorkoutDetail(details, e.wo, { onBack: () => showDay(ds) });
    }));
  }

  function reDraw() {
    page.innerHTML = drawMonth();
    page.querySelectorAll('.cal-day[data-date]').forEach(el => el.addEventListener('click', () => {
      page.querySelectorAll('.cal-day.selected').forEach(s => s.classList.remove('selected'));
      el.classList.add('selected');
      showDay(el.dataset.date);
    }));
    on('cal-prev', 'click', () => { viewMonth--; if (viewMonth<0){viewMonth=11;viewYear--;} reDraw(); });
    on('cal-next', 'click', () => { viewMonth++; if (viewMonth>11){viewMonth=0;viewYear++;} reDraw(); });
  }
  reDraw();
}

async function loadText(file) {
  const res = await fetch('./data/' + file);
  if (!res.ok) throw new Error('not found');
  return res.text();
}

function formatMarkdown(md) {
  return escHtml(md)
    .replace(/^#{1,3} (.*)$/gm, '<div style="font-weight:700;color:var(--text);margin:12px 0 4px">$1</div>')
    .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
    .replace(/^\s*[-*] (.*)$/gm, '<li>$1</li>')
    .replace(/(?:<li>[\s\S]*?<\/li>\n?)+/g, m => '<ul style="margin:4px 0 10px 18px">' + m + '</ul>')
    .replace(/\n{2,}/g, '<br><br>').replace(/\n/g, '<br>');
}

// Per-km area chart (inline SVG). invert=true puts the smallest value on top —
// used for pace, where fewer seconds = faster.
function miniChart(values, { color, invert = false, fmt = v => v, height = 140, band = null } = {}) {
  const clean = values.filter(v => v != null && !isNaN(v));
  if (clean.length < 2) return '<div style="color:var(--text-3);font-size:.82rem;padding:8px 0">Not enough split data.</div>';
  const W = 820, H = height, pl = 44, pr = 12, pt = 12, pb = 8, iw = W - pl - pr, ih = H - pt - pb;
  let mn = Math.min(...clean), mx = Math.max(...clean);
  if (band) { mn = Math.min(mn, band[0]); mx = Math.max(mx, band[1]); }  // keep the band in view
  const range = (mx - mn) || 1, n = values.length;
  const yOf = v => pt + (invert ? (v - mn) / range : 1 - (v - mn) / range) * ih;
  const pts = values.map((v, i) => v == null || isNaN(v) ? null : { x: pl + (i / Math.max(n - 1, 1)) * iw, y: yOf(v) }).filter(Boolean);
  let path = `M${pts[0].x.toFixed(1)},${pts[0].y.toFixed(1)}`;
  for (let i = 1; i < pts.length; i++) {
    const mxd = (pts[i - 1].x + pts[i].x) / 2;
    path += ` C${mxd.toFixed(1)},${pts[i - 1].y.toFixed(1)} ${mxd.toFixed(1)},${pts[i].y.toFixed(1)} ${pts[i].x.toFixed(1)},${pts[i].y.toFixed(1)}`;
  }
  const gid = 'cg' + Math.random().toString(36).slice(2, 7);
  const top = invert ? mn : mx, bot = invert ? mx : mn;
  let bandSvg = '';
  if (band) {
    const yA = yOf(band[1]), yB = yOf(band[0]), yTop = Math.min(yA, yB), hgt = Math.abs(yB - yA);
    bandSvg = `<rect x="${pl}" y="${yTop.toFixed(1)}" width="${iw}" height="${Math.max(hgt, 1).toFixed(1)}" fill="var(--emerald)" opacity=".13"/>
      <line x1="${pl}" x2="${pl + iw}" y1="${yA.toFixed(1)}" y2="${yA.toFixed(1)}" stroke="var(--emerald)" stroke-width="1" stroke-dasharray="5 4" opacity=".55"/>
      <line x1="${pl}" x2="${pl + iw}" y1="${yB.toFixed(1)}" y2="${yB.toFixed(1)}" stroke="var(--emerald)" stroke-width="1" stroke-dasharray="5 4" opacity=".55"/>
      <text x="${pl + iw - 3}" y="${(yTop + 11).toFixed(1)}" text-anchor="end" fill="var(--emerald)" font-size="10" font-family="var(--font-m)" opacity=".85">efficient: ${fmt(band[0])}–${fmt(band[1])}</text>`;
  }
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto" preserveAspectRatio="none">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity=".26"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    ${bandSvg}
    <path d="${path} L${pts[pts.length - 1].x.toFixed(1)},${pt + ih} L${pts[0].x.toFixed(1)},${pt + ih} Z" fill="url(#${gid})"/>
    <path d="${path}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="3" y="${pt + 9}" fill="var(--text-3)" font-size="11" font-family="var(--font-m)">${fmt(top)}</text>
    <text x="3" y="${pt + ih}" fill="var(--text-3)" font-size="11" font-family="var(--font-m)">${fmt(bot)}</text>
  </svg>`;
}

const ZONE_COLORS = ['#3FB6E0', '#22C55E', '#EAB308', '#F97316', '#EF4444']; // Z1..Z5
const ZONE_LABELS = ['Recovery', 'Easy', 'Aerobic', 'Threshold', 'Max'];

// Time-in-HR-zone as labelled horizontal bars. Works for any activity with hr_zones.
function hrZoneBars(zones) {
  const z = (zones || []).filter(x => x && x.secs);
  if (!z.length) return '';
  const total = z.reduce((a, b) => a + (b.secs || 0), 0) || 1;
  const lowOf = {}; (zones || []).forEach(x => { if (x && x.low != null) lowOf[x.zone] = x.low; });
  return `<div class="zbars">` + z.map(x => {
    const pct = Math.round((x.secs / total) * 100);
    const c = ZONE_COLORS[(x.zone || 1) - 1] || 'var(--text-3)';
    const nextLow = lowOf[(x.zone || 0) + 1];
    const bpm = x.low != null ? `<span class="zbpm">${x.low}${nextLow ? '–' + (nextLow - 1) : '+'} bpm</span>` : '';
    return `<div class="zrow"><div class="zlbl">Z${x.zone} <span>${ZONE_LABELS[(x.zone || 1) - 1] || ''}</span>${bpm}</div>
      <div class="ztrack"><div class="zfill" style="width:${Math.max(pct, 1)}%;background:${c}"></div></div>
      <div class="zval">${Math.round(x.secs / 60)}m · ${pct}%</div></div>`;
  }).join('') + `</div>`;
}

// Histogram of values (e.g. per-km paces) into bins — the "distribution" view.
function paceHistogram(values, { fmt = v => v } = {}) {
  const vals = values.filter(v => v != null && !isNaN(v));
  if (vals.length < 3) return '';
  const mn = Math.min(...vals), mx = Math.max(...vals), span = (mx - mn) || 1;
  const BINS = Math.min(10, Math.max(5, Math.round(vals.length / 2)));
  const w = span / BINS, counts = new Array(BINS).fill(0);
  vals.forEach(v => { counts[Math.min(BINS - 1, Math.floor((v - mn) / w))]++; });
  const peak = Math.max(...counts) || 1;
  return `<div class="hist">` + counts.map((c, i) =>
    `<div class="hbar" title="${fmt(mn + i * w)} (${c})"><div class="hfill" style="height:${Math.round((c / peak) * 100)}%"></div></div>`
  ).join('') + `</div><div class="hist-x"><span>${fmt(mn)}</span><span>${fmt(mx)}</span></div>`;
}

function matchedWorkout(plan, activityId) {
  if (!plan || !plan.weeks) return null;
  const idStr = String(activityId);
  for (const wk of plan.weeks) for (const wo of (wk.workouts || []))
    if ((wo.matched_activity_ids || []).map(String).includes(idStr)) return { wo, week: wk };
  return null;
}

function deterministicInsights(detail, act, match) {
  const out = [];
  const avg = a => a.reduce((x, y) => x + y, 0) / a.length;
  const sp = ((detail && detail.splits) || []).filter(s => s.pace_sec);
  if (sp.length >= 3) {
    const k = Math.max(1, Math.floor(sp.length / 3));
    const first = avg(sp.slice(0, k).map(s => s.pace_sec)), last = avg(sp.slice(-k).map(s => s.pace_sec));
    const fade = (last - first) / first * 100;
    out.push(Math.abs(fade) < 2 ? 'Even pacing — held steady start to finish.'
      : fade > 0 ? `Positive split — slowed ${fade.toFixed(0)}% over the run (faded).`
      : `Negative split — sped up ${(-fade).toFixed(0)}%, strong finish.`);
    const hr = sp.filter(s => s.avg_hr);
    if (hr.length >= 3) {
      const drift = avg(sp.slice(-k).map(s => s.avg_hr || 0)) - avg(sp.slice(0, k).map(s => s.avg_hr || 0));
      if (drift > 5) out.push(`HR drifted up ~${Math.round(drift)} bpm — cardiac drift / fatigue.`);
    }
  }
  if (act.training_effect_aerobic) out.push(`Aerobic TE ${act.training_effect_aerobic.toFixed(1)}/5 — ${act.training_effect_aerobic >= 3 ? 'meaningful aerobic stimulus.' : 'maintenance / recovery level.'}`);
  if (match) {
    const tgtKm = match.wo.estimated_distance_meters ? match.wo.estimated_distance_meters / 1000 : null;
    const actKm = act.distance_meters ? act.distance_meters / 1000 : null;
    if (tgtKm && actKm) out.push(`Planned ~${tgtKm.toFixed(1)} km (${(match.wo.workout_type || '').replace(/_/g, ' ')}); ran ${actKm.toFixed(1)} km.`);
  }
  return out.length ? `<ul style="margin:0;padding-left:18px;line-height:1.7;font-size:.88rem;color:var(--text-2)">${out.map(x => `<li>${escHtml(x)}</li>`).join('')}</ul>` : '';
}

function analyzeActivityWithCoach(act, btn) {
  if (!requireToken()) return;
  withBusy(btn, 'Requesting…', async () => {
    const title = `Coach: analyze activity ${act.activity_id} (${act.name || 'activity'})`;
    const body = `Analyze Garmin activity **${act.activity_id}** — "${act.name || ''}" on ${act.start_time || ''}.\n\nWrite the analysis to \`data/analyses/${act.activity_id}.md\`: what was done, how it compares to the planned workout (if one matched), how it affects my athlete profile, and what I should improve.`;
    const res = await fetch(`https://api.github.com/repos/${REPO}/issues`, { method: 'POST', headers: ghHeaders(), body: JSON.stringify({ title, body, labels: ['coach'] }) });
    if (!res.ok) throw new Error(await ghError(res));
    const issue = await res.json();
    toast('ok', 'Analysis requested', `<a href="${issue.html_url}" target="_blank" rel="noopener">#${issue.number}</a> — Claude will write it shortly.`);
  });
}

// Inner body (metrics → charts → planned-vs-actual → coach analysis) shared by the
// full-page activity view and the inline calendar panel. No modal chrome.
function activityDetailBody(act, detail, analysisMd, match) {
  const distKm = act.distance_meters ? (act.distance_meters / 1000).toFixed(2) : '—';
  const duration = act.duration_seconds ? formatSeconds(act.duration_seconds) : '—';
  const pace = act.avg_pace_sec_per_km ? formatPace(act.avg_pace_sec_per_km) + '/km' : '—';
  const splits = (detail && detail.splits) || [];
  const series = (detail && detail.series) || [];
  const runSplits = splits.filter(s => s.pace_sec != null);
  const hrOverTime = series.map(s => s.hr);
  const paceOverTime = series.map(s => s.pace);
  const cadOverTime = series.map(s => s.cad);
  const strideOverTime = series.map(s => s.stride);
  const sec = (title, body) => body ? `<div class="act-sec"><div class="eyebrow" style="margin-bottom:6px">${title}</div>${body}</div>` : '';

  const runHr = runSplits.filter(s => s.avg_hr != null);
  let charts = '';
  // Heart rate over time (cardio + running); fall back to per-km HR for runs with
  // multiple splits. (Cardio's single session-lap isn't a per-km series.)
  if (hrOverTime.filter(v => v != null).length >= 3)
    charts += sec('Heart rate over time', miniChart(hrOverTime, { color: 'var(--rose)', fmt: v => Math.round(v) + ' bpm', height: 120 }));
  else if (runHr.length >= 2)
    charts += sec('Heart rate per km', miniChart(runSplits.map(s => s.avg_hr), { color: 'var(--rose)', fmt: v => Math.round(v) + ' bpm', height: 120 }));
  // Pace over time (running); fall back to per-km pace.
  if (paceOverTime.filter(v => v != null).length >= 3)
    charts += sec('Pace over time', miniChart(paceOverTime, { color: 'var(--sky)', invert: true, fmt: v => formatPace(v) }));
  else if (runSplits.length >= 2)
    charts += sec('Pace per km', miniChart(splits.map(s => s.pace_sec), { color: 'var(--sky)', invert: true, fmt: v => formatPace(v) }));
  // Cadence (running economy) — over time from the series, else per-km from splits.
  // Shaded band = the efficient 170–180 spm range (below it usually means over-striding).
  const cadFmt = v => Math.round(v) + ' spm', CAD_BAND = [170, 180];
  if (cadOverTime.filter(v => v != null).length >= 3)
    charts += sec('Cadence over time', miniChart(cadOverTime, { color: 'var(--violet)', fmt: cadFmt, height: 110, band: CAD_BAND }));
  else if (runSplits.some(s => s.avg_cadence))
    charts += sec('Cadence per km', miniChart(runSplits.map(s => s.avg_cadence), { color: 'var(--violet)', fmt: cadFmt, height: 110, band: CAD_BAND }));
  // Stride length over time. Efficient band is pace-aware: the stride you'd take at
  // THIS run's speed with an efficient cadence (speed ÷ 180 to ÷ 170). Above it = over-striding.
  if (strideOverTime.filter(v => v != null).length >= 3) {
    const spdMmin = (act.distance_meters && act.duration_seconds) ? act.distance_meters / act.duration_seconds * 60 : null;
    const strideBand = spdMmin ? [spdMmin / 180 * 100, spdMmin / 170 * 100] : null;  // cm, matching the series
    charts += sec('Stride length over time', miniChart(strideOverTime, { color: 'var(--amber)', fmt: v => (v / 100).toFixed(2) + ' m', height: 110, band: strideBand }));
  }
  // Time-in-HR-zone distribution (cardio + running).
  charts += sec('Heart-rate zones', hrZoneBars(detail && detail.hr_zones));
  // Pace distribution (running).
  if (runSplits.length >= 3)
    charts += sec('Pace distribution', paceHistogram(runSplits.map(s => s.pace_sec), { fmt: v => formatPace(v) }));
  // Per-km splits table (running).
  if (runSplits.length >= 2)
    charts += `<div class="act-sec"><div class="eyebrow" style="margin-bottom:8px">Splits</div>
      <table class="splits-tbl"><thead><tr><th>#</th><th>km</th><th>Pace</th><th>HR</th><th>Elev</th></tr></thead><tbody>
      ${splits.map(s => `<tr><td>${s.n}</td><td>${s.distance_m ? (s.distance_m / 1000).toFixed(2) : '—'}</td><td class="mono">${s.pace_sec ? formatPace(s.pace_sec) : '—'}</td><td class="mono">${s.avg_hr ?? '—'}</td><td>${s.elev_gain != null ? Math.round(s.elev_gain) + 'm' : '—'}</td></tr>`).join('')}
      </tbody></table></div>`;
  if (!charts)
    charts = `<div class="act-sec" style="padding:10px 12px;background:var(--elevated);border-radius:var(--r-sm);font-size:.84rem;color:var(--text-2)">No chart data for this activity yet — it appears after the next sync (recent activities only).</div>`;

  const planHtml = match ? `<div class="act-sec"><div class="eyebrow" style="margin-bottom:8px">Planned vs actual</div>
    <div class="detail-grid">
      ${detailItem(escHtml(match.wo.name || '—'), 'Planned')}
      ${detailItem((match.wo.workout_type || '').replace(/_/g, ' ') || '—', 'Type')}
      ${detailItem((match.wo.estimated_distance_meters ? (match.wo.estimated_distance_meters / 1000).toFixed(1) : '—') + ' km', 'Planned dist')}
      ${detailItem(distKm + ' km', 'Actual dist')}
    </div>
    ${match.wo.purpose ? `<div style="font-size:.84rem;color:var(--text-3);margin-top:8px">${escHtml(match.wo.purpose.replace(/_/g, ' '))}</div>` : ''}
  </div>` : '';

  const insights = deterministicInsights(detail, act, match);
  const analysisInner = analysisMd
    ? `<div class="act-analysis">${formatMarkdown(analysisMd)}</div>`
    : `<div>${insights || '<div style="color:var(--text-3);font-size:.85rem">No AI analysis yet.</div>'}
        <button class="btn btn-primary btn-sm" id="act-analyze" style="margin-top:12px">${icons.spark} Analyze with Coach</button>
        <div class="hint" style="margin-top:6px">Asks Claude (via GitHub) to write a full coaching analysis of this session.</div></div>`;

  return `
    <div class="detail-grid">
      ${detailItem(distKm, 'Distance km')}${detailItem(duration, 'Duration')}${detailItem(pace, 'Avg Pace')}
      ${detailItem(act.avg_hr || '—', 'Avg HR')}${detailItem(act.max_hr || '—', 'Max HR')}${detailItem(act.calories || '—', 'Calories')}
      ${detailItem(act.avg_running_cadence ? Math.round(act.avg_running_cadence) : '—', 'Cadence')}
      ${detailItem(act.avg_stride_length ? (act.avg_stride_length / 100).toFixed(2) + 'm' : '—', 'Stride')}
      ${detailItem(act.avg_ground_contact_time ? Math.round(act.avg_ground_contact_time) + 'ms' : '—', 'GCT')}
      ${detailItem(act.training_effect_aerobic ? act.training_effect_aerobic.toFixed(1) : '—', 'Aerobic TE')}
      ${detailItem(act.training_effect_anaerobic ? act.training_effect_anaerobic.toFixed(1) : '—', 'Anaerobic TE')}
      ${detailItem(act.elevation_gain ? Math.round(act.elevation_gain) + 'm' : '—', 'Elevation')}
    </div>
    ${charts}
    ${planHtml}
    <div class="act-sec"><div class="eyebrow" style="margin-bottom:8px">Coach analysis</div>${analysisInner}</div>`;
}

// Render an activity's full detail into a container (page or calendar panel). onBack,
// when given, shows a back button wired to it.
async function renderActivityDetail(container, act, { onBack } = {}) {
  container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  const id = act.activity_id;
  let detail = null, analysisMd = null, plan = null;
  try { detail = await loadJSON(`details/${id}.json`); } catch {}
  try { analysisMd = await loadText(`analyses/${id}.md`); } catch {}
  try { plan = await planStore.get(); } catch {}
  const match = matchedWorkout(plan, id);
  const w = detail && detail.weather;
  const sub = `${escHtml(act.activity_type || '')}${act.start_time ? ' · ' + new Date(act.start_time).toLocaleString() : ''}${w && w.temp_c != null ? ` · ${Math.round(w.temp_c)}°C${w.desc ? ' ' + escHtml(w.desc) : ''}` : ''}`;
  container.innerHTML = `<div class="fade-in">
    <div class="detail-head">
      ${onBack ? `<button class="btn btn-ghost btn-sm" data-back>${icons.back} Back</button>` : ''}
      <div><div class="detail-h-title">${escHtml(act.name || 'Activity')}</div><div class="detail-h-sub">${sub}</div></div>
    </div>
    ${activityDetailBody(act, detail, analysisMd, match)}
  </div>`;
  const ab = container.querySelector('#act-analyze');
  if (ab) ab.addEventListener('click', () => analyzeActivityWithCoach(act, ab));
  const bb = container.querySelector('[data-back]');
  if (bb && onBack) bb.addEventListener('click', onBack);
}

// Open an activity as a full page (replaces the modal). Back returns to the prior tab.
let _activityReturnTab = 'home';
async function openActivity(act) {
  _activityReturnTab = state.tab;
  const page = document.getElementById('page-content');
  if (!page) return;

  await renderActivityDetail(page, act, { onBack: () => goTab(_activityReturnTab) });
  document.querySelector('.page')?.scrollTo({ top: 0 });
}

// Read-only workout detail (description + steps + completion data) for the calendar panel.
function workoutDetailBody(wo) {
  let stepsHtml = '';
  if (wo.steps && wo.steps.length) {
    stepsHtml = `<div style="margin-top:16px"><div class="eyebrow" style="margin-bottom:10px">Steps</div>`;
    for (const s of wo.steps) {
      const paceTxt = s.target_pace || (s.target_low ? formatPace(s.target_low) + (s.target_high && s.target_high !== s.target_low ? '–' + formatPace(s.target_high) : '') + '/km' : '');
      const durTxt = s.duration || (s.duration_seconds ? formatSeconds(s.duration_seconds) : (s.distance_meters ? (s.distance_meters / 1000).toFixed(1) + ' km' : ''));
      stepsHtml += `<div class="step-item">
        <div style="font-weight:600">${escHtml(s.description || s.step_type || s.type || 'Step')}</div>
        ${durTxt ? `<div style="color:var(--text-2);margin-top:3px;font-size:.8rem">${escHtml(durTxt)}</div>` : ''}
        ${paceTxt ? `<div style="color:var(--emerald);margin-top:3px;font-size:.8rem">Pace: ${escHtml(paceTxt)}</div>` : ''}
        ${s.target_hr ? `<div style="color:var(--sky);margin-top:3px;font-size:.8rem">HR: ${escHtml(String(s.target_hr))}</div>` : ''}
      </div>`;
    }
    stepsHtml += '</div>';
  }
  let metricsHtml = '';
  if (wo.completed && wo.completion_metrics) {
    const cm = wo.completion_metrics;
    metricsHtml = `<div style="margin-top:16px"><div class="eyebrow" style="margin-bottom:10px">Completion Data</div><div class="detail-grid">
      ${detailItem(cm.distance_meters ? (cm.distance_meters / 1000).toFixed(2) : '—', 'Distance')}
      ${detailItem(cm.duration_seconds ? formatSeconds(cm.duration_seconds) : '—', 'Duration')}
      ${detailItem(cm.avg_pace_sec_per_km ? formatPace(cm.avg_pace_sec_per_km) : '—', 'Pace')}
      ${detailItem(cm.avg_hr || '—', 'Avg HR')}
      ${detailItem(cm.max_hr || '—', 'Max HR')}
      ${detailItem(cm.calories || '—', 'Calories')}
    </div></div>`;
  }
  return `
    ${wo.description ? `<div style="font-size:.88rem;color:var(--text-2);line-height:1.55;margin-bottom:8px">${escHtml(wo.description)}</div>` : ''}
    ${stepsHtml}
    ${metricsHtml}
    ${wo.notes ? `<div style="margin-top:12px;font-size:.84rem;color:var(--text-3)">${escHtml(wo.notes)}</div>` : ''}`;
}

function fadeColor(pct) {
  return pct >= 15 ? 'var(--rose)' : pct >= 8 ? 'var(--amber)' : 'var(--emerald)';
}
function pill(text, color) {
  return `<span style="display:inline-flex;align-items:center;gap:5px;font-size:.72rem;font-weight:600;padding:3px 9px;border-radius:99px;background:color-mix(in srgb,${color} 16%,transparent);color:${color}">${text}</span>`;
}

// ── HYROX race visualisations (percentile, radar, pacing) ──
// Higher percentile = better (99th = near the front of the field).
function pctColor(p) { return p >= 90 ? 'var(--emerald)' : p >= 70 ? 'var(--sky)' : p >= 50 ? 'var(--amber)' : 'var(--rose)'; }

function pctBar(label, pct, sub) {
  const c = pctColor(pct);
  return `<div style="display:flex;align-items:center;gap:10px;padding:4px 0">
    <div style="width:118px;font-size:.8rem">${escHtml(label)}</div>
    <div style="flex:1;height:9px;background:var(--border-s);border-radius:5px;overflow:hidden">
      <div style="width:${Math.max(pct, 2)}%;height:100%;background:${c}"></div></div>
    <div style="width:104px;text-align:right;font-family:var(--font-m);font-size:.76rem;color:${c}">${pct}th${sub ? ' · ' + escHtml(sub) : ''}</div>
  </div>`;
}

// Per-segment percentile, every station/run in race order — the core benchmark view.
function stationPercentileCard(segments) {
  const rows = (segments || []).filter(s => s.percentile != null)
    .map(s => pctBar(s.display, s.percentile, s.field_size ? '#' + s.rank + '/' + s.field_size : '#' + s.rank)).join('');
  return rows ? fxCard('Field percentile — every segment', icons.hyrox,
    rows + `<div class="hint" style="margin-top:8px">Your placing in the gender field at each segment. Green = front of the field, red = where you lose ground.</div>`) : '';
}

// Radar of the 8 stations' percentiles — strengths vs weaknesses at a glance.
function radarChart(items, { size = 250 } = {}) {
  const n = items.length, cx = size / 2, cy = size / 2, R = size / 2 - 42;
  const ang = i => (Math.PI * 2 * i / n) - Math.PI / 2;
  const pt = (i, r) => [cx + Math.cos(ang(i)) * R * (r / 100), cy + Math.sin(ang(i)) * R * (r / 100)];
  const rings = [25, 50, 75, 100].map(r =>
    `<polygon points="${items.map((_, i) => pt(i, r).map(v => v.toFixed(1)).join(',')).join(' ')}" fill="none" stroke="var(--border-s)" stroke-width="1"/>`).join('');
  const poly = `<polygon points="${items.map((it, i) => pt(i, Math.max(it.value, 2)).map(v => v.toFixed(1)).join(',')).join(' ')}" fill="var(--violet)" fill-opacity="0.16" stroke="var(--violet)" stroke-width="2"/>`;
  const dots = items.map((it, i) => { const [x, y] = pt(i, Math.max(it.value, 2)); return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="${pctColor(it.value)}"/>`; }).join('');
  const labels = items.map((it, i) => { const x = cx + Math.cos(ang(i)) * (R + 18), y = cy + Math.sin(ang(i)) * (R + 18); return `<text x="${x.toFixed(1)}" y="${y.toFixed(1)}" font-size="8.5" fill="var(--text-3)" text-anchor="middle" dominant-baseline="middle">${escHtml(it.label)}</text>`; }).join('');
  return `<svg viewBox="0 0 ${size} ${size}" width="100%" style="max-width:300px;display:block;margin:0 auto">${rings}${poly}${dots}${labels}</svg>`;
}
function stationRadarCard(segments) {
  const stations = (segments || []).filter(s => !s.is_run && s.percentile != null);
  if (stations.length < 3) return '';
  return fxCard('Station strengths', icons.hyrox,
    radarChart(stations.map(s => ({ label: s.display.replace('Broad Jump', 'BBJ'), value: s.percentile }))) +
    `<div class="hint" style="margin-top:6px;text-align:center">Each spoke is your field percentile for that station.</div>`);
}

// Cumulative pacing curve + per-run-lap fade vs the field.
function pacingCard(r) {
  const segs = (r.segments || []).filter(s => s.cumulative != null);
  if (segs.length < 4) return '';
  const cumLine = sparkline(segs.map(s => s.cumulative), { width: 260, height: 50 });
  const runs = segs.filter(s => s.is_run);
  const maxRun = Math.max(...runs.map(s => s.seconds), 1);
  const bars = runs.map(s => {
    const h = Math.round((s.seconds / maxRun) * 56) + 4;
    const c = s.percentile != null ? pctColor(s.percentile) : 'var(--sky)';
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
      <div style="width:100%;max-width:22px;height:${h}px;background:${c};border-radius:3px 3px 0 0"></div>
      <div class="hint" style="font-size:.62rem">${escHtml(s.display_time)}</div></div>`;
  }).join('');
  return fxCard('Pacing', icons.activity || icons.hyrox, `
    <div class="eyebrow" style="margin-bottom:4px">Run laps — height = time, colour = field percentile</div>
    <div style="display:flex;align-items:flex-end;gap:5px;height:74px">${bars}</div>
    <div class="hint" style="margin:8px 0 2px">Cumulative time across the race</div>
    ${cumLine}
    <div class="hint" style="margin-top:8px">Run fade ${r.fade_pct}% (${escHtml(r.running_class || '')}). Elite athletes hold within ~5% across the 8 laps.</div>`);
}

// Roxzone (transition) spotlight — often the biggest hidden time loss.
function roxzoneCard(r) {
  if (!r.roxzone_pct) return '';
  const heavy = r.roxzone_pct >= 8;
  return fxCard('Roxzone — your transitions', icons.hyrox, `
    <div style="display:flex;align-items:baseline;gap:10px">
      <div style="font-family:var(--font-m);font-size:1.6rem;font-weight:700;color:${heavy ? 'var(--rose)' : 'var(--emerald)'}">${escHtml(r.roxzone_display)}</div>
      <div class="hint">${r.roxzone_pct}% of your race</div>
    </div>
    <div class="hint" style="margin-top:6px">${heavy
      ? 'That is a lot of standing time — drill station entries/exits and a brisk walk-to-work tempo; transitions cost more total time than any single weak station for most athletes.'
      : 'Tidy transitions — keep moving through the roxzone and you hold this edge.'}</div>`);
}

// Phase 3 — this race vs your average across your other races.
function comparePastCard(r, pastAvg) {
  const segs = (r.segments || []).filter(s => pastAvg[s.name] != null);
  if (segs.length < 4) return '';
  const rows = segs.map(s => {
    const delta = s.seconds - pastAvg[s.name];
    const better = delta < 0;
    return `<tr>
      <td style="padding:5px 8px;font-size:.82rem">${escHtml(s.display)}</td>
      <td style="padding:5px 8px;font-family:var(--font-m);font-size:.8rem;text-align:right">${escHtml(s.display_time)}</td>
      <td style="padding:5px 8px;font-family:var(--font-m);font-size:.8rem;text-align:right;color:var(--text-3)">${fmtSecs(pastAvg[s.name])}</td>
      <td style="padding:5px 8px;font-family:var(--font-m);font-size:.8rem;text-align:right;font-weight:600;color:${better ? 'var(--emerald)' : 'var(--rose)'}">${better ? '' : '+'}${Math.round(delta)}s</td>
    </tr>`;
  }).join('');
  return fxCard('vs your other races (average)', icons.hyrox, `
    <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">
      <thead><tr style="border-bottom:1px solid var(--border)">
        <th style="padding:5px 8px;text-align:left;font-size:.72rem;color:var(--text-3)">Segment</th>
        <th style="padding:5px 8px;text-align:right;font-size:.72rem;color:var(--text-3)">This race</th>
        <th style="padding:5px 8px;text-align:right;font-size:.72rem;color:var(--text-3)">Your avg</th>
        <th style="padding:5px 8px;text-align:right;font-size:.72rem;color:var(--text-3)">Δ</th>
      </tr></thead><tbody>${rows}</tbody></table></div>`);
}

function fmtSecs(secs) {
  if (secs == null) return '—';
  const t = Math.round(secs), m = Math.floor(t / 60), s = t % 60;
  return `${m}:${String(s).padStart(2, '0')}`;
}

// Per-race ranks: Overall (position in the gender field) + Age-group.
// results.hyrox.com only had a season-cumulative number; hyresult gives these per race.
function hyroxRankText(r) {
  const parts = [];
  if (r.rank) parts.push('#' + r.rank + (r.field_size ? '/' + r.field_size : '') + ' overall');
  if (r.rank_age_group) parts.push('#' + r.rank_age_group + (r.age_group ? ' in ' + r.age_group : ' AG'));
  return parts.length ? ' · ' + parts.join(' · ') : '';
}

function hyroxRaceCard(r) {
  return `<div class="card" data-race="${escHtml(r.id)}" style="cursor:pointer">
    <div class="card-h"><div class="card-title" style="font-size:.95rem">${escHtml(r.city || r.event_date || 'Race')}</div>

// ── Progression / evolution across all races ──
function sparkline(values, { width = 220, height = 44 } = {}) {
  const v = (values || []).filter(x => x != null);
  if (v.length < 2) return '';
  const min = Math.min(...v), max = Math.max(...v), span = (max - min) || 1;
  const dx = width / (v.length - 1);
  const pts = v.map((x, i) => `${(i * dx).toFixed(1)},${(height - ((x - min) / span) * height).toFixed(1)}`);
  return `<svg viewBox="0 0 ${width} ${height}" width="100%" height="${height}" preserveAspectRatio="none" style="overflow:visible">
    <polyline fill="none" stroke="var(--emerald)" stroke-width="2" points="${pts.join(' ')}"/>
    ${pts.map(p => `<circle cx="${p.split(',')[0]}" cy="${p.split(',')[1]}" r="2.5" fill="var(--emerald)"/>`).join('')}
  </svg>`;
}

function hyroxProgressionSection(prog, priorities) {
  if (!prog || !prog.num_races) return '';
  const best = prog.best_race;
  const improvingPill = prog.num_races >= 3
    ? pill(prog.improving ? 'Improving' : 'Plateauing', prog.improving ? 'var(--emerald)' : 'var(--amber)')
    : '';
  // Station progression: most improved first (positive improvement_seconds = got faster).
  const sc = (prog.station_comparison || []).filter(s => s.improvement_seconds != null);
  sc.sort((a, b) => b.improvement_seconds - a.improvement_seconds);
  const stationRows = sc.map(s => {
    const imp = s.improvement_seconds;
    const col = imp > 1 ? 'var(--emerald)' : imp < -1 ? 'var(--rose)' : 'var(--text-3)';
    const sign = imp > 0 ? '−' : imp < 0 ? '+' : '±';
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border-s)">
      <span style="font-size:.84rem">${escHtml(s.display)}</span>
      <span style="display:flex;gap:12px;align-items:center">
        <span class="hint">best ${escHtml(s.best_display)}</span>
        <span style="font-family:var(--font-m);font-size:.8rem;font-weight:600;color:${col};min-width:54px;text-align:right">${sign}${Math.abs(Math.round(imp))}s</span>
      </span></div>`;
  }).join('');
  const focus = (priorities || []).slice(0, 4).map(p =>
    `<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border-s)">
      <span style="font-size:.84rem;font-weight:500">${escHtml(p.display)}</span>
      <span class="hint">${p.gap_seconds > 0 ? '+' + Math.round(p.gap_seconds) + 's vs top-3 (' + p.gap_pct + '%)' : 'at top-3 level'}</span>
    </div>`).join('');

  return `<div class="dash-grid">
    <div class="span-6"><div class="card" style="height:100%">
      <div class="card-h"><div class="card-title"><span class="ico">${icons.hyrox}</span>Progression</div>${improvingPill}</div>
      <div style="display:flex;gap:18px;flex-wrap:wrap;margin-bottom:6px">
        <div><div class="hint">Races</div><div style="font-size:1.4rem;font-weight:700">${prog.num_races}</div></div>
        ${best ? `<div><div class="hint">Best</div><div style="font-size:1.4rem;font-weight:700;color:var(--emerald)">${escHtml(best.total_display)}</div><div class="hint">${escHtml(best.event_date)}</div></div>` : ''}
      </div>
      <div class="hint" style="margin-top:8px">Finish-time trend (lower is better)</div>
      ${sparkline(prog.total_trend)}
    </div></div>
    <div class="span-6"><div class="card" style="height:100%">
      <div class="card-h"><div class="card-title"><span class="ico">${icons.spark}</span>Focus for next race</div></div>
      <div class="hint" style="margin-bottom:6px">Biggest gaps to the top-3 field in your latest race.</div>
      ${focus || '<div class="hint">No priorities computed.</div>'}
    </div></div>
    ${stationRows ? `<div class="span-12"><div class="card">
      <div class="card-h"><div class="card-title">Station evolution — first race → latest</div></div>
      ${stationRows}</div></div>` : ''}
  </div>`;
}

// ── Single-race detail ──
async function openHyroxRace(id) {
  const page = document.getElementById('page-content');

  let coachMd = null; try { coachMd = await loadText(`analyses/hyrox-${id}.md`); } catch {}
  // Average each segment across your OTHER races for the "vs your past races" compare.
  const pastAvg = {};

    (o.segments || []).forEach(s => { (acc[s.name] = acc[s.name] || []).push(s.seconds); }));

function hyroxRaceFeedback(r) {
  const sa = r.split_analysis || [];
  const behind = sa.filter(s => s.gap_vs_top3 != null && s.gap_vs_top3 > 0)
    .sort((a, b) => b.gap_vs_top3 - a.gap_vs_top3).slice(0, 3);
  const ahead = sa.filter(s => s.beats_top3).slice(0, 3);
  const mistakes = [];
  if (r.fade_pct >= 15) mistakes.push(`Severe run fade (${r.fade_pct}%) — you went out too hot. Even pacing across the 8 runs is your biggest free time.`);
  else if (r.fade_pct >= 8) mistakes.push(`Moderate run fade (${r.fade_pct}%) — a positive split. Hold the first two runs ~10s/km easier.`);
  if (r.roxzone_pct >= 8) mistakes.push(`Roxzone is ${r.roxzone_pct}% of your race (${r.roxzone_display}) — slow transitions. Drill station entries/exits and walk-to-work tempo.`);
  return { behind, ahead, mistakes };
}

// Latest sync.yml run from the Actions API (null without a token / on error).
async function fetchLastSyncRun() {
  if (!githubToken.has()) return null;
  try {
    const res = await fetch(`https://api.github.com/repos/${REPO}/actions/workflows/sync.yml/runs?per_page=1`, { headers: ghHeaders() });
    if (!res.ok) return null;
    const j = await res.json();
    return (j.workflow_runs || [])[0] || null;
  } catch { return null; }
}

function syncRunHtml(run) {
  if (!githubToken.has()) return '<span style="color:var(--text-3)">add a token to see live runs</span>';
  if (!run) return '<span style="color:var(--text-3)">no runs yet</span>';
  const when = formatTimeAgo(run.run_started_at || run.created_at);
  let label = 'running…', color = 'var(--sky)';
  if (run.status === 'completed') {
    const ok = run.conclusion === 'success';
    label = ok ? 'succeeded' : (run.conclusion || 'failed');
    color = ok ? 'var(--emerald)' : 'var(--rose)';
  }
  return `<a href="${run.html_url}" target="_blank" rel="noopener" style="color:${color};font-weight:600">${label}</a> · ${when}`;
}

async function dispatchHyrox(inputs) {
  const res = await fetch(`https://api.github.com/repos/${REPO}/actions/workflows/hyrox.yml/dispatches`,
    { method: 'POST', headers: ghHeaders(), body: JSON.stringify({ ref: REF, inputs }) });
  if (!res.ok && res.status !== 204) throw new Error(await ghError(res));
}

// Poll the committed hyrox.json on raw (public, no Pages-deploy wait) until the
// import workflow overwrites it for this profile slug; returns the race count.
async function pollHyrox(slug, prevName, { tries = 25, delay = 6000 } = {}) {
  const url = `https://raw.githubusercontent.com/${REPO}/${REF}/data/hyrox.json`;
  for (let i = 0; i < tries; i++) {
    await new Promise(r => setTimeout(r, delay));
    try {
      const res = await fetch(`${url}?t=${Date.now()}`, { cache: 'no-store' });
      if (res.ok) {
        const p = await res.json();
        if (p.search_name === slug && p.search_name !== prevName) return (p.results || []).length;
      }
    } catch {}
  }
  return null;
}

function bindHyroxImport(page) {
  const status = page.querySelector('#hx-status');
  on('hx-import', 'click', e => withBusy(e.currentTarget, 'Importing…', async () => {
    if (!requireToken()) return;
    let slug = val('hx-slug').trim();
    const m = slug.match(/\/athlete\/([a-z0-9-]+)/i);   // accept a full profile URL too
    if (m) slug = m[1];
    slug = slug.replace(/^\/+|\/+$/g, '');
    if (!slug) { toast('err', 'Slug required', 'Paste your hyresult profile URL or slug.'); return; }
    let prevName = null;
    try { const r0 = await fetch(`https://raw.githubusercontent.com/${REPO}/${REF}/data/hyrox.json?t=${Date.now()}`, { cache: 'no-store' }); if (r0.ok) prevName = (await r0.json()).search_name; } catch {}
    await dispatchHyrox({ mode: 'profile', slug, gender: val('hx-gender') || 'M' });
    status.textContent = 'Importing from hyresult.com… ~30–60s, then the dashboard redeploys.';
    const count = await pollHyrox(slug, prevName);
    if (count == null) { status.innerHTML = 'Dispatched. Track the <a href="https://github.com/' + REPO + '/actions/workflows/hyrox.yml" target="_blank" rel="noopener">workflow run</a>; your races refresh after it redeploys.'; return; }
    status.textContent = `Imported ${count} race(s). The dashboard refreshes on the next redeploy (~1 min).`;
  }));
}

// ── Settings: upcoming events ──
const EVENT_TYPES = ['HYROX', '5K', '10K', 'Half Marathon', 'Marathon', 'Other'];
function eventRow(ev = {}) {
  return `<div class="ev-row" style="display:grid;grid-template-columns:140px 1fr 130px 90px 32px;gap:8px;align-items:center;margin-bottom:8px">
    <input type="date" value="${escHtml(ev.date || '')}" data-ev="date" class="mono-input">
    <input type="text" placeholder="Event name / city" value="${escHtml(ev.name || '')}" data-ev="name">
    <select data-ev="type">${EVENT_TYPES.map(t => `<option ${ev.type === t ? 'selected' : ''}>${t}</option>`).join('')}</select>
    <input type="text" placeholder="goal" value="${escHtml(ev.goal_time || '')}" data-ev="goal_time" class="mono-input">
    <button class="btn-icon" data-ev-remove aria-label="Remove event">×</button>
  </div>`;
}
function eventsCard(events) {
  const rows = (events && events.length ? events : []).map(eventRow).join('') || eventRow();
  return `<div class="card">
    <div class="card-h"><div class="card-title"><span class="ico">${icons.calendar || icons.hyrox}</span>Upcoming events</div></div>
    <div class="hint" style="margin-bottom:12px">Add your next races/runs. The coach reads these (with your health metrics) to taper into events and build between them — ask it to "rebalance my plan around my events".</div>
    <div id="events-rows">${rows}</div>
    <div style="display:flex;gap:10px;margin-top:6px">
      <button class="btn btn-outline btn-sm" id="ev-add">+ Add event</button>
      <button class="btn btn-primary btn-sm" id="ev-save">${icons.check || ''} Save events</button>
    </div>
  </div>`;
}
function bindEventsCard(page) {
  const rows = page.querySelector('#events-rows');
  if (!rows) return;
  const bindRemoves = () => rows.querySelectorAll('[data-ev-remove]').forEach(b =>
    b.onclick = () => b.closest('.ev-row').remove());
  bindRemoves();
  on('ev-add', 'click', () => { rows.insertAdjacentHTML('beforeend', eventRow()); bindRemoves(); });
  on('ev-save', 'click', e => withBusy(e.currentTarget, 'Saving…', async () => {
    if (!requireToken()) return;
    const list = [...rows.querySelectorAll('.ev-row')].map(r => {
      const g = k => (r.querySelector(`[data-ev="${k}"]`)?.value || '').trim();
      return { date: g('date'), name: g('name'), type: g('type'), goal_time: g('goal_time') };
    }).filter(ev => ev.date || ev.name).sort((a, b) => String(a.date).localeCompare(String(b.date)));
    const res = await fetch(`https://api.github.com/repos/${REPO}/actions/workflows/save-events.yml/dispatches`,
      { method: 'POST', headers: ghHeaders(), body: JSON.stringify({ ref: REF, inputs: { data: JSON.stringify(list) } }) });
    if (!res.ok && res.status !== 204) throw new Error(await ghError(res));
    toast('ok', 'Events saved', 'Rebuilding (~1–2 min). Ask the coach to rebalance your plan around them.');
  }));
}

// ═══════════════════════════════════════════════════════
// UTILITIES (preserved)
// ═══════════════════════════════════════════════════════
function on(id, event, handler) { document.getElementById(id)?.addEventListener(event, handler); }
function val(id) { return (document.getElementById(id)?.value || '').trim(); }
function escHtml(s) { const d = document.createElement('div'); d.textContent = s == null ? '' : s; return d.innerHTML; }

function labelValue(label, value) {
  if (value == null || value === '') return '';
  return `<div class="lv"><span class="lv-label">${label}</span><span class="lv-val">${escHtml(String(value))}</span></div>`;
}
function detailItem(value, label) {
  return `<div class="detail-item"><div class="d-val">${value}</div><div class="d-lbl">${label}</div></div>`;
}
function metricCard(label, value, sub) {
  return `<div class="stat"><div class="stat-label">${label}</div><div class="stat-value">${value}</div>${sub ? `<div class="stat-sub">${escHtml(sub)}</div>` : ''}</div>`;
}

function formatPace(secPerKm) {
  if (!secPerKm || secPerKm <= 0) return '—';
  const m = Math.floor(secPerKm / 60); const s = Math.round(secPerKm % 60);
  return `${m}:${String(s).padStart(2,'0')}`;
}
function formatSeconds(totalSec) {
  if (!totalSec || totalSec <= 0) return '—';
  const h = Math.floor(totalSec/3600), m = Math.floor((totalSec%3600)/60), s = Math.round(totalSec%60);
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}
function formatTimeAgo(iso) {
  if (!iso) return '';
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  if (diff < 604800) return Math.floor(diff/86400) + 'd ago';
  return new Date(iso).toLocaleDateString();
}

// ── Boot ───────────────────────────────────────────────
try { const u = JSON.parse(localStorage.getItem('pf_user') || 'null'); if (u && u.name) state.user = u; } catch {}
render();
</script>
