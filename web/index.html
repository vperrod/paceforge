<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0B0D12">
<title>PaceForge</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='6' y='18' width='5' height='8' rx='1' fill='%2310B981' opacity='.3'/><rect x='13' y='12' width='5' height='14' rx='1' fill='%2310B981' opacity='.6'/><rect x='20' y='5' width='5' height='21' rx='1' fill='%2310B981'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Figtree:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* ── Surfaces (near-black, layered) ── */
  --bg:#0B0D12;--bg-2:#0E1118;--surface:#12151E;--card:#161A24;--elevated:#1B202C;--hover:#1F2430;
  --border:rgba(150,165,200,.10);--border-s:rgba(150,165,200,.06);--border-x:rgba(150,165,200,.18);
  /* ── Text ── */
  --text:#EAEEF6;--text-2:#9AA4BC;--text-3:#5E6678;
  /* ── Accents ── */
  --emerald:#13C892;--emerald-2:#34D8A8;--emerald-d:rgba(19,200,146,.14);--emerald-g:rgba(19,200,146,.06);
  --amber:#F5A623;--amber-d:rgba(245,166,35,.14);
  --sky:#38BDF8;--sky-d:rgba(56,189,248,.14);
  --rose:#FB5A6E;--rose-d:rgba(251,90,110,.14);
  --violet:#A78BFA;--violet-d:rgba(167,139,250,.14);
  /* ── Geometry ── */
  --r:16px;--r-md:12px;--r-sm:9px;--r-pill:999px;
  --sp:4px;
  --shadow:0 1px 0 rgba(255,255,255,.02) inset,0 8px 30px -12px rgba(0,0,0,.6);
  --shadow-lg:0 24px 60px -20px rgba(0,0,0,.7);
  --ease:cubic-bezier(.22,1,.36,1);
  --t-fast:.14s;--t:.24s;
  --font-d:'Space Grotesk',sans-serif;--font-b:'Figtree',sans-serif;--font-m:'JetBrains Mono',monospace;
  --safe-b:env(safe-area-inset-bottom,0px);
  --sidebar-w:248px;--maxw:1320px;
}
html{height:100%;-webkit-tap-highlight-color:transparent}
body{
  font-family:var(--font-b);color:var(--text);
  background:
    radial-gradient(1200px 600px at 12% -8%,rgba(19,200,146,.10),transparent 60%),
    radial-gradient(900px 500px at 100% 0%,rgba(56,189,248,.06),transparent 55%),
    var(--bg);
  background-attachment:fixed;
  min-height:100%;-webkit-font-smoothing:antialiased;overflow-x:hidden;
}
input,textarea,select,button{font-family:inherit;font-size:inherit;color:inherit}
a{color:var(--emerald);text-decoration:none}
::selection{background:var(--emerald-d);color:var(--emerald-2)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--elevated);border-radius:8px;border:3px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:var(--hover);background-clip:padding-box}
:focus-visible{outline:2px solid var(--emerald);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ════════ APP SHELL ════════ */
#app{min-height:100dvh}
.shell{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100dvh}

/* ── Sidebar (desktop) ── */
.sidebar{
  position:sticky;top:0;height:100dvh;display:flex;flex-direction:column;
  background:linear-gradient(180deg,rgba(18,21,30,.9),rgba(11,13,18,.9));
  border-right:1px solid var(--border);padding:22px 16px;backdrop-filter:blur(12px);
}
.brand{display:flex;align-items:center;gap:11px;padding:4px 8px 22px}
.brand-mark{width:34px;height:34px;flex-shrink:0}
.brand-name{font-family:var(--font-d);font-weight:700;font-size:1.18rem;letter-spacing:-.02em}
.brand-name .dot{color:var(--emerald)}
.nav{display:flex;flex-direction:column;gap:3px;flex:1}
.nav-label{font-size:.64rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);padding:14px 12px 6px}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--r-sm);
  color:var(--text-2);font-weight:600;font-size:.9rem;cursor:pointer;border:none;background:none;
  width:100%;text-align:left;transition:background var(--t-fast),color var(--t-fast);position:relative;
}
.nav-item svg{width:19px;height:19px;flex-shrink:0}
.nav-item:hover{background:var(--hover);color:var(--text)}
.nav-item.active{background:var(--emerald-d);color:var(--emerald-2)}
.nav-item.active::before{content:"";position:absolute;left:-16px;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:var(--emerald)}
.sidebar-foot{border-top:1px solid var(--border);padding-top:14px;margin-top:8px}
.side-user{display:flex;align-items:center;gap:10px;padding:6px 8px}
.side-avatar{width:34px;height:34px;border-radius:50%;background:var(--emerald-d);color:var(--emerald-2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
.side-user-name{font-weight:600;font-size:.85rem;line-height:1.2}
.side-user-mail{font-size:.72rem;color:var(--text-3);line-height:1.2}

/* ── Main ── */
.main{min-width:0;display:flex;flex-direction:column}
.page{flex:1;overflow-y:auto}
.page-inner{max-width:var(--maxw);margin:0 auto;padding:28px 36px 64px;width:100%}

/* ── Top bar (sticky) ── */
.topbar{
  position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:16px;
  padding:16px 36px;border-bottom:1px solid var(--border);
  background:rgba(11,13,18,.72);backdrop-filter:blur(16px);
}
.topbar .page-title{font-family:var(--font-d);font-weight:700;font-size:1.25rem;letter-spacing:-.01em;line-height:1.1}
.topbar .page-sub{font-size:.8rem;color:var(--text-2);margin-top:1px}
.topbar-actions{margin-left:auto;display:flex;align-items:center;gap:10px}

/* ── Bottom tab bar (mobile only) ── */
.tab-bar{display:none}

/* ════════ BUTTONS ════════ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 18px;border:1px solid transparent;border-radius:var(--r-sm);
  font-weight:600;font-size:.88rem;cursor:pointer;white-space:nowrap;
  transition:background var(--t-fast),border-color var(--t-fast),transform var(--t-fast),opacity var(--t-fast);
}
.btn svg{width:17px;height:17px}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--emerald);color:#06251A;box-shadow:0 6px 18px -8px var(--emerald)}
.btn-primary:hover:not(:disabled){background:var(--emerald-2)}
.btn-ghost{background:var(--elevated);color:var(--text);border-color:var(--border)}
.btn-ghost:hover:not(:disabled){background:var(--hover);border-color:var(--border-x)}
.btn-outline{background:transparent;color:var(--text-2);border-color:var(--border-x)}
.btn-outline:hover:not(:disabled){color:var(--text);background:var(--elevated)}
.btn-danger{background:var(--rose-d);color:var(--rose);border-color:rgba(251,90,110,.3)}
.btn-danger:hover:not(:disabled){background:rgba(251,90,110,.2)}
.btn-sm{padding:7px 12px;font-size:.8rem;border-radius:var(--r-sm)}
.btn-icon{width:38px;height:38px;padding:0;border-radius:var(--r-sm);background:var(--elevated);border:1px solid var(--border);color:var(--text-2)}
.btn-icon:hover{color:var(--text);background:var(--hover)}
.btn-block{width:100%}
.btn-link{background:none;border:none;color:var(--text-2);font-size:.85rem;cursor:pointer;font-weight:600}
.btn-link:hover{color:var(--emerald)}

/* ════════ CARDS ════════ */
.card{
  background:linear-gradient(180deg,var(--card),var(--surface));
  border:1px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--shadow);
}
.card-pad-sm{padding:16px}
.card-h{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}
.card-title{font-family:var(--font-d);font-weight:600;font-size:1rem;letter-spacing:-.01em;display:flex;align-items:center;gap:9px}
.card-title .ico{color:var(--emerald)}
.card-title .ico svg{width:18px;height:18px}
.eyebrow{font-size:.66rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3)}

/* ── Grids ── */
.grid{display:grid;gap:18px}
.stat-row{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
.cols-auto{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}
.dash-grid{display:grid;gap:18px;grid-template-columns:repeat(12,1fr)}
.span-4{grid-column:span 4}.span-5{grid-column:span 5}.span-6{grid-column:span 6}
.span-7{grid-column:span 7}.span-8{grid-column:span 8}.span-12{grid-column:span 12}
.mt{margin-top:18px}.mt-sm{margin-top:10px}

/* ── Stat cards (hero) ── */
.stat{
  background:linear-gradient(160deg,var(--card),var(--surface));
  border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;
  position:relative;overflow:hidden;transition:border-color var(--t),transform var(--t);
}
.stat:hover{border-color:var(--border-x);transform:translateY(-2px)}
.stat::after{content:"";position:absolute;right:-30px;top:-30px;width:90px;height:90px;border-radius:50%;background:var(--accent,var(--emerald));opacity:.07;filter:blur(8px)}
.stat-label{font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3)}
.stat-value{font-family:var(--font-m);font-size:2rem;font-weight:700;line-height:1.05;margin-top:10px;letter-spacing:-.02em}
.stat-value .unit{font-size:.9rem;color:var(--text-3);font-weight:500;margin-left:3px}
.stat-sub{font-size:.78rem;color:var(--text-2);margin-top:6px;display:flex;align-items:center;gap:6px}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:.7rem;font-weight:700;padding:3px 9px;border-radius:var(--r-pill);background:var(--accent-d,var(--emerald-d));color:var(--accent,var(--emerald))}
.dotmark{width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block}

/* ── Mini label/value rows ── */
.lv{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border-s);font-size:.88rem}
.lv:last-child{border-bottom:none}
.lv-label{color:var(--text-2)}
.lv-val{font-weight:600;font-family:var(--font-m);font-size:.86rem}

/* ── Gauges ── */
.gauge-row{display:flex;align-items:center;gap:12px;margin-bottom:11px}
.gauge-row:last-child{margin-bottom:0}
.gauge-tag{font-size:.78rem;color:var(--text-2);width:96px;flex-shrink:0}
.gauge-bar{flex:1;height:8px;background:var(--elevated);border-radius:var(--r-pill);overflow:hidden}
.gauge-fill{height:100%;border-radius:var(--r-pill);transition:width .5s var(--ease)}
.gauge-num{font-family:var(--font-m);font-size:.78rem;width:46px;text-align:right;color:var(--text-2)}
.grade-badge{display:inline-block;font-size:.68rem;font-weight:700;padding:2px 9px;border-radius:var(--r-pill)}

/* ════════ ACTIVITY / WORKOUT ITEMS ════════ */
.act-item{
  display:flex;align-items:center;gap:14px;padding:13px 14px;border-radius:var(--r-md);
  border:1px solid transparent;cursor:pointer;transition:background var(--t-fast),border-color var(--t-fast);
}
.act-item:hover{background:var(--elevated);border-color:var(--border)}
.act-bar{width:4px;align-self:stretch;border-radius:4px;flex-shrink:0}
.act-icon{width:38px;height:38px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--elevated)}
.act-icon svg{width:18px;height:18px}
.act-info{flex:1;min-width:0}
.act-name{font-weight:600;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.act-meta{font-size:.78rem;color:var(--text-2);margin-top:2px}
.act-stat{text-align:right;flex-shrink:0}
.act-stat .v{font-family:var(--font-m);font-weight:600;font-size:.9rem}
.act-stat .l{font-size:.66rem;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em}
.wo-badge{font-size:.66rem;font-weight:700;padding:3px 9px;border-radius:var(--r-pill);white-space:nowrap;flex-shrink:0}

.divlist > * + *{border-top:1px solid var(--border-s)}

/* ── Week selector ── */
.week-nav{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px;scrollbar-width:thin}
.week-btn{
  flex-shrink:0;padding:9px 15px;border-radius:var(--r-sm);border:1px solid var(--border);
  background:var(--elevated);color:var(--text-2);font-size:.82rem;font-weight:600;cursor:pointer;
  white-space:nowrap;transition:all var(--t-fast);display:flex;flex-direction:column;gap:1px;align-items:flex-start;line-height:1.2;
}
.week-btn small{font-size:.62rem;color:var(--text-3);font-weight:500}
.week-btn:hover{border-color:var(--border-x)}
.week-btn.active{background:var(--emerald-d);color:var(--emerald-2);border-color:rgba(19,200,146,.4)}
.week-btn.active small{color:var(--emerald)}

/* ── Pace grid / editor ── */
.pace-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.pace-item{padding:12px 14px;background:var(--elevated);border:1px solid var(--border);border-radius:var(--r-md)}
.pace-item .pl{font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);font-weight:700}
.pace-item .pv{font-family:var(--font-m);font-weight:700;font-size:1.05rem;color:var(--emerald);margin-top:4px}
.pace-item .pv .u{font-size:.72rem;color:var(--text-3);font-weight:400}

/* ════════ CALENDAR ════════ */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-day-label{font-size:.68rem;color:var(--text-3);font-weight:700;text-align:center;padding:4px 0;text-transform:uppercase;letter-spacing:.05em}
.cal-day{
  min-height:86px;border:1px solid var(--border-s);border-radius:var(--r-sm);padding:7px 8px;
  cursor:pointer;transition:background var(--t-fast),border-color var(--t-fast);display:flex;flex-direction:column;gap:4px;
}
.cal-day:hover{background:var(--elevated);border-color:var(--border)}
.cal-day.today{border-color:rgba(19,200,146,.5)}
.cal-day.today .cal-num{color:var(--emerald)}
.cal-day.selected{background:var(--emerald-d);border-color:var(--emerald)}
.cal-day.other-month{opacity:.35}
.cal-num{font-size:.82rem;font-weight:600;font-family:var(--font-m)}
.cal-pill{font-size:.64rem;padding:2px 6px;border-radius:5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.cal-grid.compact{gap:4px}
.cal-grid.compact .cal-day{min-height:44px;padding:5px 6px;gap:3px}
.cal-dots{display:flex;flex-wrap:wrap;gap:3px;margin-top:auto}
.cal-dot{width:6px;height:6px;border-radius:50%}
.detail-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.detail-head .btn svg{width:15px;height:15px}
.detail-h-title{font-size:1.15rem;font-weight:700;line-height:1.2}
.detail-h-sub{font-size:.82rem;color:var(--text-3);margin-top:2px}

/* ════════ HYROX ════════ */
.hyrox-station{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border-s)}
.hyrox-station:last-child{border-bottom:none}
.hyrox-name{font-size:.86rem;font-weight:500}
.hyrox-time{font-family:var(--font-m);font-size:.9rem;font-weight:600}

/* ════════ SETTINGS ════════ */
.settings-row{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:14px 0;border-bottom:1px solid var(--border-s)}
.settings-row:last-child{border-bottom:none}
.settings-label{font-size:.9rem;font-weight:500}
.settings-value{font-size:.85rem;color:var(--text-2);font-family:var(--font-m)}
.field{margin-bottom:14px}
.field label{display:block;font-size:.8rem;font-weight:600;color:var(--text-2);margin-bottom:7px}
.field input,.field textarea,.field select{
  width:100%;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r-sm);
  padding:12px 14px;font-size:.92rem;outline:none;transition:border-color var(--t-fast);
}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--emerald)}
.field .hint{font-size:.74rem;color:var(--text-3);margin-top:6px;line-height:1.45}
.mono-input{font-family:var(--font-m)}
.conn-status{display:inline-flex;align-items:center;gap:7px;font-size:.82rem;font-weight:600;padding:5px 11px;border-radius:var(--r-pill)}
.conn-on{background:var(--emerald-d);color:var(--emerald)}
.conn-off{background:var(--elevated);color:var(--text-3)}

/* ── Sub tabs ── */
.sub-tabs{display:flex;gap:7px;overflow-x:auto;padding-bottom:8px;margin-bottom:20px;scrollbar-width:thin}
.sub-tab{
  flex-shrink:0;padding:8px 16px;border-radius:var(--r-pill);border:1px solid var(--border);
  background:var(--elevated);color:var(--text-2);font-size:.82rem;font-weight:600;cursor:pointer;
  white-space:nowrap;transition:all var(--t-fast);
}
.sub-tab:hover{border-color:var(--border-x)}
.sub-tab.active{background:var(--emerald-d);color:var(--emerald-2);border-color:rgba(19,200,146,.4)}

/* ════════ STATES ════════ */
.loading{display:flex;justify-content:center;padding:64px 0}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--emerald);border-radius:50%;animation:spin .6s linear infinite}
.empty{
  text-align:center;padding:48px 24px;color:var(--text-3);font-size:.92rem;
  border:1px dashed var(--border-x);border-radius:var(--r);background:var(--surface);
}
.empty .e-ico{width:46px;height:46px;margin:0 auto 14px;border-radius:14px;background:var(--elevated);display:flex;align-items:center;justify-content:center;color:var(--text-2)}
.empty .e-ico svg{width:24px;height:24px}
.empty .e-title{color:var(--text);font-weight:600;font-size:1rem;margin-bottom:6px}
.banner{display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:var(--r-md);font-size:.86rem}
.banner.warn{background:var(--amber-d);border:1px solid rgba(245,166,35,.3);color:var(--text)}
.banner .b-ico{flex-shrink:0;color:var(--amber)}
.banner .b-ico svg{width:20px;height:20px}

/* ════════ ANIMATIONS ════════ */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}
.fade-in{animation:fadeUp .32s var(--ease)}
.fade-in > *{animation:fadeUp .4s var(--ease) backwards}
.fade-in > *:nth-child(2){animation-delay:.04s}
.fade-in > *:nth-child(3){animation-delay:.08s}
.fade-in > *:nth-child(4){animation-delay:.12s}
.fade-in > *:nth-child(5){animation-delay:.16s}

/* ════════ MODAL ════════ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(5,7,11,.66);backdrop-filter:blur(4px);z-index:200;
  opacity:0;transition:opacity var(--t);pointer-events:none;display:flex;align-items:center;justify-content:center;padding:24px;
}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{
  width:100%;max-width:560px;max-height:88dvh;overflow-y:auto;
  background:linear-gradient(180deg,var(--card),var(--surface));
  border:1px solid var(--border-x);border-radius:var(--r);box-shadow:var(--shadow-lg);
  padding:24px;transform:translateY(14px) scale(.98);transition:transform var(--t) var(--ease);
}
.modal-overlay.open .modal{transform:none}
.modal-h{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px}
.modal-title{font-family:var(--font-d);font-weight:700;font-size:1.2rem;letter-spacing:-.01em}
.modal-sub{font-size:.84rem;color:var(--text-2);margin-top:4px}
.modal-close{background:var(--elevated);border:1px solid var(--border);border-radius:var(--r-sm);width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-2);flex-shrink:0}

<body>
<div id="app"></div>
<div id="toasts"></div>

<script>
// ═══════════════════════════════════════════════════════
// PaceForge — single-user static training dashboard
// Data layer (apiJson / loadJSON) reads ./data/*.json only.
// Actions reach GitHub directly using a user-supplied PAT.
// ═══════════════════════════════════════════════════════

// ── State ──────────────────────────────────────────────
const state = {
  user: { name: 'Victor', email: 'vperrod@gmail.com', role: 'user' },
  tab: 'home',
};
const REPO = 'vperrod/paceforge';     // owner/repo for GitHub actions
const REF  = 'master';

// ═══════════════════════════════════════════════════════
// STATIC DATA LAYER  (unchanged contract — DO NOT BREAK)
// ═══════════════════════════════════════════════════════
const cache = {};

async function loadJSON(file) {
  const key = 'f:' + file;
  if (cache[key]) return cache[key];
  const res = await fetch('./data/' + file);
  if (!res.ok) throw new Error('Failed to load ' + file);
  const v = await res.json();
  cache[key] = v;
  return v;
}

async function apiJson(path, opts = {}) {
  const p = path.split('?')[0];
  if (opts.method && opts.method !== 'GET') return {};   // static: no writes
  switch (p) {
    case '/profile/analytics': return loadJSON('analytics.json');
    case '/plans': { const plan = await planStore.get().catch(() => null); return plan ? [plan] : []; }
    case '/activities': return loadJSON('activities.json');
    case '/auth/profile': return profileMeta();
    case '/garmin/status': { const pr = await loadJSON('profile.json').catch(() => null); return { connected: !!(pr && pr.profile_date) }; }
    case '/weekly-overview': return loadJSON('weekly.json').catch(() => ({ content: null }));
    case '/hyrox/results': return hyroxResults();
    case '/feed': return feedFromActivities();
    default:
      if (p.startsWith('/feed/')) return [];
      return null;
  }
}

async function profileMeta() {
  const pr = await loadJSON('profile.json').catch(() => ({}));
  return {
    name: state.user.name, email: state.user.email, role: 'user', status: 'active',
    garmin_email: state.user.email, created_at: pr.profile_date || '',
  };
}

async function hyroxResults() {
  const h = await loadJSON('hyrox.json').catch(() => ({ results: [] }));
  return (h.results || []).map(r => ({
    race_name: r.event_date || r.city || 'Race',
    overall_time: r.total_time_display || '',
    stations: (r.splits || []).map(s => ({
      name: (s.name || '').replace(/_/g, ' '),
      time: formatSeconds(s.time_seconds),
    })),
  }));
}

async function feedFromActivities() {
  const acts = await loadJSON('activities.json').catch(() => []);
  return acts.slice(0, 20).map(a => ({
    id: a.activity_id, user_name: state.user.name, title: a.name || a.activity_type || 'Activity',
    created_at: a.start_time, like_count: 0, comment_count: 0, user_liked: false,
    metadata: {
      distance_meters: a.distance_meters, duration_seconds: a.duration_seconds,
      avg_pace_sec_per_km: a.avg_pace_sec_per_km, avg_hr: a.avg_hr, calories: a.calories,
      elevation_gain: a.elevation_gain, training_effect_aerobic: a.training_effect_aerobic,
    },
  }));
}

// ═══════════════════════════════════════════════════════
// PLAN STORE  — localStorage-backed editable plan
// Seeded from ./data/plan.json on first load (key: pf_plan).
// All Plan-view reads go through planStore.get().
// ═══════════════════════════════════════════════════════
const PLAN_KEY = 'pf_plan';
const planStore = {
  _mem: null,
  async _seed() {
    const plan = await loadJSON('plan.json');
    return JSON.parse(JSON.stringify(plan));
  },
  async get() {
    if (this._mem) return this._mem;
    const raw = localStorage.getItem(PLAN_KEY);
    if (raw) { try { this._mem = JSON.parse(raw); return this._mem; } catch {} }
    this._mem = await this._seed();
    this._persist();
    return this._mem;
  },
  _persist() {
    try { localStorage.setItem(PLAN_KEY, JSON.stringify(this._mem)); } catch {}
  },
  // mutator receives the live plan object; mutate it then persist
  async update(mutator) {
    const plan = await this.get();
    mutator(plan);
    this._mem = plan;
    this._persist();
    clearCache('plans');           // invalidate apiJson('/plans') TTL cache
    delete cache['f:plan.json'];   // not strictly needed, but keep synced-source clean
    return plan;
  },
  async reset() {
    this._mem = await this._seed();
    this._persist();
    clearCache('plans');
    return this._mem;
  },
  // helpers to address a workout deterministically
  workoutKey(weekIdx, woIdx) { return weekIdx + ':' + woIdx; },
  async setPaces(paces) {
    return this.update(plan => {
      ['easy_pace','marathon_pace','threshold_pace','interval_pace','repetition_pace'].forEach(k => {
        if (paces[k] != null && !isNaN(paces[k])) plan[k] = paces[k];
      });
    });
  },
  async toggleComplete(weekIdx, woIdx) {
    return this.update(plan => {
      const wo = plan.weeks?.[weekIdx]?.workouts?.[woIdx];
      if (wo) wo.completed = !wo.completed;
    });
  },
  async reschedule(weekIdx, woIdx, date) {
    return this.update(plan => {
      const wo = plan.weeks?.[weekIdx]?.workouts?.[woIdx];
      if (wo) wo.scheduled_date = date;
    });
  },
  async setNote(weekIdx, woIdx, note) {
    return this.update(plan => {
      const wo = plan.weeks?.[weekIdx]?.workouts?.[woIdx];
      if (wo) wo.notes = note;
    });
  },
  async export() {
    const plan = await this.get();
    const blob = new Blob([JSON.stringify(plan, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'plan.json'; a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  },
};

function exportPlan() { planStore.export(); }

// ═══════════════════════════════════════════════════════
// GITHUB INTEGRATION  — real actions from a static page
// Token lives ONLY in localStorage (pf_gh_token). Never committed.
// ═══════════════════════════════════════════════════════
const GH_TOKEN_KEY = 'pf_gh_token';
const githubToken = {
  get() { return (localStorage.getItem(GH_TOKEN_KEY) || '').trim(); },
  set(t) { localStorage.setItem(GH_TOKEN_KEY, (t || '').trim()); },
  clear() { localStorage.removeItem(GH_TOKEN_KEY); },
  has() { return !!this.get(); },
};

function ghHeaders() {
  return {
    'Authorization': 'Bearer ' + githubToken.get(),
    'Accept': 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28',
    'Content-Type': 'application/json',
  };
}

function requireToken() {
  if (githubToken.has()) return true;
  toast('err', 'GitHub not connected', 'Add a Personal Access Token in Settings → GitHub to enable this action.');
  return false;
}

// ── ACTION 1: Sync from Garmin (workflow_dispatch sync.yml) ──
async function syncFromGarmin(btn) {
  if (!requireToken()) return;
  withBusy(btn, 'Dispatching…', async () => {
    const res = await fetch(`https://api.github.com/repos/${REPO}/actions/workflows/sync.yml/dispatches`, {
      method: 'POST', headers: ghHeaders(), body: JSON.stringify({ ref: REF }),
    });
    if (res.status === 204) {
      toast('ok', 'Garmin sync started', 'The sync workflow is running. Data refreshes in a few minutes — reload then.');
    } else {
      throw new Error(await ghError(res));
    }
  });
}

// ── ACTION 2: Push a plan week to Garmin (workflow_dispatch push.yml) ──
async function pushWeekToGarmin(weekNumber, btn) {
  if (!requireToken()) return;
  withBusy(btn, 'Pushing…', async () => {
    const res = await fetch(`https://api.github.com/repos/${REPO}/actions/workflows/push.yml/dispatches`, {
      method: 'POST', headers: ghHeaders(),
      body: JSON.stringify({ ref: REF, inputs: { week: String(weekNumber) } }),
    });
    if (res.status === 204) {
      toast('ok', `Week ${weekNumber} → Garmin`, 'Push workflow dispatched. Workouts will appear on your Garmin calendar shortly.');
    } else {
      throw new Error(await ghError(res));
    }
  });
}

// ── ACTION 3: Generate / adapt plan (opens a GitHub issue → Claude coach) ──
function openCoachModal(prefillWeek) {
  if (!requireToken()) return;
  const defaultBody =
`**Goal:** HYROX — Intermediate (target ${'2026-11-15'})

**What I want the coach to do:**
- [ ] Build a fresh plan
- [x] Adapt my current plan

**Context / changes since last sync:**
-

**Constraints (days/week, time, niggles):**
-

${prefillWeek ? `**Focus week:** ${prefillWeek}\n` : ''}_Generated from the PaceForge dashboard. Edit freely before submitting._`;

  openModal(`
    <div class="modal-h">
      <div>
        <div class="modal-title">Ask the Coach</div>
        <div class="modal-sub">Opens a GitHub issue that triggers Claude's coaching workflow.</div>
      </div>
      <button class="modal-close" data-close>${icons.x}</button>
    </div>
    <div class="field">
      <label for="coach-title">Issue title</label>
      <input id="coach-title" value="Coach: build/adapt my plan">
    </div>
    <div class="field">
      <label for="coach-body">Request (Markdown)</label>
      <textarea id="coach-body" rows="11" class="mono-input" style="font-size:.82rem;line-height:1.5">${escHtml(defaultBody)}</textarea>
      <div class="hint">This is posted to <b>${REPO}</b> issues. The coach workflow reads it and responds.</div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" data-close>Cancel</button>
      <button class="btn btn-primary" id="coach-submit">${icons.spark} Create issue</button>
    </div>
  `);
  on('coach-submit', 'click', () => submitCoachIssue());
}

async function submitCoachIssue() {
  const title = val('coach-title') || 'Coach: build/adapt my plan';
  const body = document.getElementById('coach-body')?.value || '';
  const btn = document.getElementById('coach-submit');
  withBusy(btn, 'Creating…', async () => {
    const res = await fetch(`https://api.github.com/repos/${REPO}/issues`, {
      method: 'POST', headers: ghHeaders(),
      body: JSON.stringify({ title, body, labels: ['coach'] }),
    });
    if (res.ok) {
      const issue = await res.json();
      closeModal();
      toast('ok', 'Issue created', `<a href="${issue.html_url}" target="_blank" rel="noopener">#${issue.number} — view on GitHub</a>`);
    } else {
      throw new Error(await ghError(res));
    }
  });
}

async function ghError(res) {
  let detail = '';
  try { const j = await res.json(); detail = j.message || ''; } catch {}
  if (res.status === 401) return 'Token rejected (401). Check your PAT in Settings.';
  if (res.status === 403) return 'Forbidden (403). Token needs Actions/Issues write on this repo.';
  if (res.status === 404) return 'Not found (404). Workflow/repo missing or token lacks access.';
  if (res.status === 422) return 'Invalid request (422). ' + detail;
  return `GitHub error ${res.status}. ${detail}`;
}

// Run an async action with a busy button + error toast.
async function withBusy(btn, busyLabel, fn) {
  const orig = btn ? btn.innerHTML : null;
  if (btn) { btn.disabled = true; btn.dataset.orig = orig; btn.innerHTML = `<span class="spinner" style="width:16px;height:16px;border-width:2px"></span>${busyLabel}`; }
  try { await fn(); }
  catch (e) { toast('err', 'Action failed', escHtml(e.message || 'Unknown error')); }
  finally { if (btn) { btn.disabled = false; btn.innerHTML = orig; } }
}

// ── Toasts ─────────────────────────────────────────────
function toast(kind, title, body) {
  const ico = kind === 'ok' ? icons.check : kind === 'err' ? icons.alert : icons.info;
  const el = document.createElement('div');
  el.className = 'toast ' + kind;
  el.innerHTML = `<span class="t-ico">${ico}</span><div class="t-body"><b>${escHtml(title)}</b>${body || ''}</div><button class="t-x" aria-label="Dismiss">×</button>`;
  document.getElementById('toasts').appendChild(el);
  const kill = () => { el.style.opacity = '0'; el.style.transform = 'translateX(20px)'; setTimeout(() => el.remove(), 200); };
  el.querySelector('.t-x').addEventListener('click', kill);
  if (kind !== 'err') setTimeout(kill, 6000); else setTimeout(kill, 10000);
}

// ── Modal ──────────────────────────────────────────────
function openModal(content, wide) {
  closeModal();
  const ov = document.createElement('div');
  ov.className = 'modal-overlay';
  ov.id = 'modal-overlay';
  ov.innerHTML = `<div class="modal${wide ? ' wide' : ''}" role="dialog" aria-modal="true">${content}</div>`;
  document.body.appendChild(ov);
  requestAnimationFrame(() => ov.classList.add('open'));
  ov.addEventListener('click', e => { if (e.target === ov) closeModal(); });
  ov.querySelectorAll('[data-close]').forEach(b => b.addEventListener('click', closeModal));
  document.addEventListener('keydown', escClose);
}
function closeModal() {
  const ov = document.getElementById('modal-overlay');
  if (ov) { ov.classList.remove('open'); setTimeout(() => ov.remove(), 220); }
  document.removeEventListener('keydown', escClose);
}
function escClose(e) { if (e.key === 'Escape') closeModal(); }

// ═══════════════════════════════════════════════════════
// SVG ICONS
// ═══════════════════════════════════════════════════════

  calendar:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>`,

  settings:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.2V21a2 2 0 1 1-4 0v-.1a1.6 1.6 0 0 0-2.7-1.2l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.6 1.6 0 0 0 4.6 14H4a2 2 0 1 1 0-4h.1a1.6 1.6 0 0 0 1.2-2.7l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1A1.6 1.6 0 0 0 10 4.6V4a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 2.7 1.2l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1A1.6 1.6 0 0 0 19.4 9H20a2 2 0 1 1 0 4h-.6z"/></svg>`,
  sync:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5M3 21v-5h5"/></svg>`,
  push:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="m5 12 7-7 7 7"/></svg>`,

// ── Cache helpers ──────────────────────────────────────
async function cached(key, fetcher, ttl = 60000) {
  if (cache[key] && Date.now() - cache[key].t < ttl) return cache[key].v;
  const v = await fetcher();
  if (v !== null && v !== undefined) cache[key] = { v, t: Date.now() };
  return v;
}
function clearCache(prefix) { for (const k of Object.keys(cache)) { if (k.startsWith(prefix)) delete cache[k]; } }

function navItem(id, label, ic) {
  return `<button class="nav-item ${state.tab===id?'active':''}" data-tab="${id}">${ic}<span>${label}</span></button>`;
}

function bindShell() {
  document.querySelectorAll('[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => goTab(btn.dataset.tab));
  });
}

function goTab(tab) {
  state.tab = tab;
  document.querySelectorAll('[data-tab]').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  loadTab(tab);
  document.querySelector('.page')?.scrollTo({ top: 0 });
}

function setTopbar(title, sub, actionsHtml) {
  const t = document.getElementById('tb-title'), s = document.getElementById('tb-sub'), a = document.getElementById('tb-actions');
  if (t) t.textContent = title;
  if (s) s.textContent = sub || '';
  if (a) a.innerHTML = actionsHtml || '';
}

async function loadTab(tab) {
  const meta = NAV.find(n => n[0] === tab);
  setTopbar(meta ? meta[1] : 'PaceForge', meta ? meta[3] : '', '');
  const page = document.getElementById('page-content');
  if (!page) return;
  page.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    switch (tab) {
      case 'home': await renderHome(page); break;
      case 'fitness': await renderFitness(page); break;
      case 'plan': await renderPlan(page); break;
      case 'calendar': await renderCalendar(page); break;
      case 'settings': await renderSettings(page); break;
      case 'hyrox': await renderHyroxPage(page); break;
      default: page.innerHTML = emptyState('Coming soon', '');
    }
  } catch (e) {
    page.innerHTML = emptyState('Failed to load', escHtml(e.message));
  }
}

function emptyState(title, sub, icon) {
  return `<div class="empty"><div class="e-ico">${icon || icons.info}</div><div class="e-title">${title}</div>${sub ? `<div>${sub}</div>` : ''}</div>`;
}

function statCard(s) {
  return `<div class="stat" style="--accent:${s.accent};--accent-d:${s.accentD}">
    <div class="stat-label">${s.label}</div>
    <div class="stat-value">${s.value}${s.unit ? `<span class="unit">${s.unit}</span>` : ''}</div>
    ${s.sub ? `<div class="stat-sub"><span class="chip"><span class="dotmark"></span>${escHtml(s.sub)}</span></div>` : ''}
  </div>`;
}

function recentActivitiesCard(activities) {
  const recent = (activities || []).slice(0, 6);
  let rows = '';
  if (recent.length) {
    rows = `<div class="divlist">${recent.map((act, i) => activityRow(act, i)).join('')}</div>`;
  } else {
    rows = emptyState('No activities yet', 'Sync from Garmin to populate your feed.', icons.run);
  }
  return `<div class="card" style="height:100%">
    <div class="card-h">
      <div class="card-title"><span class="ico">${icons.run}</span>Recent Activity</div>
      <button class="btn-link" data-jump-cal>Calendar →</button>
    </div>
    ${rows}
  </div>`;
}

function activityRow(act, i) {
  const isRun = (act.activity_type || '').toLowerCase().includes('run');
  const color = isRun ? 'var(--emerald)' : 'var(--violet)';
  const distKm = act.distance_meters ? (act.distance_meters / 1000).toFixed(1) : null;
  const pace = act.avg_pace_sec_per_km ? formatPace(act.avg_pace_sec_per_km) + '/km'
            : (isRun && distKm && act.duration_seconds ? formatPace(act.duration_seconds / (act.distance_meters/1000)) + '/km' : '');
  const when = act.start_time ? formatTimeAgo(act.start_time) : '';
  return `<div class="act-item" data-act-idx="${i}">
    <div class="act-icon" style="color:${color}">${isRun ? icons.run : icons.dumbbell}</div>
    <div class="act-info">
      <div class="act-name">${escHtml(act.name || act.activity_type || 'Activity')}</div>
      <div class="act-meta">${when}${pace ? ' · ' + pace : ''}${act.avg_hr ? ' · ' + Math.round(act.avg_hr) + ' bpm' : ''}</div>
    </div>
    <div class="act-stat">
      <div class="v">${distKm != null ? distKm : (act.duration_seconds ? formatSeconds(act.duration_seconds) : '—')}</div>
      <div class="l">${distKm != null ? 'km' : 'time'}</div>
    </div>
  </div>`;
}

function bindActivityRows(page, activities) {
  page.querySelectorAll('[data-act-idx]').forEach(el => {
    el.addEventListener('click', () => {
      const act = (activities || [])[+el.dataset.actIdx];
      if (act) openActivity(act);
    });
  });
}
function bindWeekJump(page) {
  page.querySelectorAll('[data-jump-cal]').forEach(el => el.addEventListener('click', () => goTab('calendar')));
  page.querySelectorAll('[data-jump-plan]').forEach(el => el.addEventListener('click', () => goTab('plan')));
}

function thisWeekCard(plan) {
  if (!plan || !plan.weeks || !plan.weeks.length) {
    return `<div class="card" style="height:100%"><div class="card-h"><div class="card-title"><span class="ico">${icons.plan}</span>This Week</div></div>${emptyState('No plan loaded', 'Generate one from the Plan tab.', icons.plan)}</div>`;
  }
  const idx = currentWeekIndex(plan);
  const w = plan.weeks[idx];
  const workouts = (w.workouts || []);
  const done = workouts.filter(x => x.completed).length;
  const pct = workouts.length ? Math.round(done / workouts.length * 100) : 0;
  const upcoming = workouts.slice(0, 4);
  return `<div class="card" style="height:100%">
    <div class="card-h">
      <div class="card-title"><span class="ico">${icons.plan}</span>Week ${idx + 1}</div>
      <button class="btn-link" data-jump-plan>Open plan →</button>
    </div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      <div style="flex:1">
        <div class="eyebrow">${escHtml(w.phase || 'Block')}${w.focus ? ' · ' + escHtml(w.focus) : ''}</div>
        <div style="font-size:.82rem;color:var(--text-2);margin-top:4px">${w.total_distance_km ? w.total_distance_km.toFixed(0) + ' km planned' : ''} · ${done}/${workouts.length} done</div>
      </div>
      <div style="font-family:var(--font-m);font-weight:700;font-size:1.4rem;color:var(--emerald)">${pct}<span style="font-size:.8rem;color:var(--text-3)">%</span></div>
    </div>
    <div class="gauge-bar" style="margin-bottom:14px"><div class="gauge-fill" style="width:${pct}%;background:var(--emerald)"></div></div>
    <div class="divlist">
      ${upcoming.map(wo => {
        const c = woColor(wo.workout_type);
        const dist = wo.estimated_distance_meters ? (wo.estimated_distance_meters/1000).toFixed(1) + ' km' : '';
        return `<div class="act-item" style="padding:10px 0;cursor:default">
          <div class="act-bar" style="background:${c}"></div>
          <div class="act-info">
            <div class="act-name">${wo.completed ? '✓ ' : ''}${escHtml(wo.name || 'Workout')}</div>
            <div class="act-meta">${wo.scheduled_date || ''}${dist ? ' · ' + dist : ''}</div>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function racePredictionsCard(rp) {
  const preds = (rp.predictions || []).filter(p => ['5K','10K','Half Marathon','Marathon'].includes(p.distance));
  if (!preds.length) {
    return `<div class="card" style="height:100%"><div class="card-h"><div class="card-title"><span class="ico">${icons.hyrox}</span>Race Predictions</div></div>${emptyState('No predictions', '', icons.hyrox)}</div>`;
  }
  return `<div class="card" style="height:100%">
    <div class="card-h"><div class="card-title"><span class="ico">${icons.hyrox}</span>Race Predictions</div>${rp.optimal_distance ? `<span class="chip" style="--accent:var(--sky);--accent-d:var(--sky-d)">Best · ${escHtml(rp.optimal_distance)}</span>` : ''}</div>
    <div class="divlist">
      ${preds.map(p => {
        const conf = p.confidence === 'High' ? 'var(--emerald)' : p.confidence === 'Moderate' ? 'var(--amber)' : 'var(--text-3)';
        return `<div class="act-item" style="padding:11px 0;cursor:default">
          <div class="act-info">
            <div class="act-name">${escHtml(p.distance)}</div>
            <div class="act-meta">${formatPace(p.pace_sec_per_km)}/km</div>
          </div>
          <div class="act-stat">
            <div class="v" style="color:var(--emerald)">${formatSeconds(p.predicted_seconds)}</div>
            <div class="l" style="color:${conf}">${p.confidence || ''}</div>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function loadRecoveryCard(lr, profile) {
  const gauges = [
    ['Body Battery', lr.body_battery ?? profile.body_battery_current, 100, 'var(--emerald)'],
    ['Sleep Score', lr.sleep_score ?? profile.sleep_score, 100, 'var(--sky)'],
    ['Training Load 7d', lr.training_load_7day ?? profile.training_load_7day, 800, 'var(--violet)'],
  ];
  const tags = [
    ['Load Status', lr.load_status],
    ['HRV', lr.hrv_assessment || profile.hrv_status],
    ['Fatigue Risk', lr.fatigue_risk],
    ['Load Focus', lr.load_focus || profile.load_focus],
  ].filter(t => t[1]);
  return `<div class="card" style="height:100%">
    <div class="card-h"><div class="card-title"><span class="ico">${icons.heart}</span>Load &amp; Recovery</div><button class="btn-link" data-jump-cal style="display:none"></button></div>
    <div class="dash-grid" style="gap:14px">
      <div class="span-7">
        ${gauges.map(([l,v,max,c]) => {
          const pct = v != null ? Math.min(100, Math.round(v/max*100)) : 0;
          return `<div class="gauge-row"><span class="gauge-tag">${l}</span><div class="gauge-bar"><div class="gauge-fill" style="width:${pct}%;background:${c}"></div></div><span class="gauge-num">${v ?? '—'}</span></div>`;
        }).join('')}
      </div>
      <div class="span-5">
        ${tags.map(([l,v]) => `<div class="lv"><span class="lv-label">${l}</span><span class="lv-val">${escHtml(String(v))}</span></div>`).join('')}
      </div>
    </div>
  </div>`;
}

function greeting() { const h = new Date().getHours(); return h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening'; }
function woColor(type) {
  const c = { easy_run:'var(--emerald)', recovery_run:'var(--text-3)', tempo:'var(--amber)', threshold:'var(--amber)', long_run:'var(--sky)', intervals:'var(--rose)', speed:'var(--rose)', race_pace:'var(--violet)', fartlek:'var(--sky)', hyrox_mixed:'var(--violet)', cross_training:'var(--text-2)', rest:'var(--text-3)' };
  return c[type] || 'var(--text-2)';
}
function currentWeekIndex(plan) {
  const weeks = plan.weeks || [];
  const today = new Date().toISOString().slice(0,10);
  for (let i = 0; i < weeks.length; i++) {
    const dates = (weeks[i].workouts || []).map(x => x.scheduled_date).filter(Boolean);
    if (dates.some(d => d >= today)) return i;
  }
  return 0;
}

// VIEW: FITNESS (sub-sections — renderers preserved)

async function renderFitness(page) {
  const analytics = await cached('analytics', () => apiJson('/profile/analytics').catch(() => null));
  if (!analytics) {
    page.innerHTML = `<div class="fade-in">${emptyState('No analytics data', 'Sync from Garmin first.', icons.fitness)}</div>`;
    return;
  }
  const subTabs = [
    ['weekly', 'Weekly'], ['snapshot', 'Snapshot'], ['aerobic', 'Aerobic'],
    ['economy', 'Economy'], ['load', 'Load'], ['races', 'Races'],
    ['training', 'Training'], ['hyrox_p', 'HYROX'],
  ];
  let activeSub = 'snapshot';

  function draw() {
    page.innerHTML = `<div class="fade-in">
      <div class="sub-tabs">${subTabs.map(([id,l]) => `<button class="sub-tab ${activeSub===id?'active':''}" data-sub="${id}">${l}</button>`).join('')}</div>
      <div id="fitness-content"></div>
    </div>`;
    page.querySelectorAll('.sub-tab').forEach(b => b.addEventListener('click', () => {
      activeSub = b.dataset.sub;
      page.querySelectorAll('.sub-tab').forEach(x => x.classList.toggle('active', x.dataset.sub === activeSub));
      drawContent();
    }));
    drawContent();
  }
  function drawContent() {
    const el = document.getElementById('fitness-content');
    if (!el) return;
    el.className = 'grid cols-auto';
    switch (activeSub) {
      case 'weekly': el.className = ''; renderWeeklyOverview(el); break;
      case 'snapshot': el.innerHTML = renderSnapshot(analytics); break;
      case 'aerobic': el.innerHTML = renderAerobic(analytics); break;
      case 'economy': el.innerHTML = renderEconomy(analytics); break;
      case 'load': el.innerHTML = renderLoadRecovery(analytics); break;
      case 'races': el.innerHTML = renderRaces(analytics); break;
      case 'training': el.innerHTML = renderTraining(analytics); break;
      case 'hyrox_p': el.innerHTML = renderHyroxProfile(analytics); break;
    }
  }
  draw();
}

function renderWeeklyOverview(el) {

  apiJson('/weekly-overview').then(data => {
    if (!data || !data.content) { el.innerHTML = emptyState('No weekly overview yet', 'Generated by the coach workflow.', icons.calendar); return; }
    drawWeeklyContent(el, data);
  }).catch(() => { el.innerHTML = emptyState('Weekly overview unavailable', '', icons.calendar); });

function drawWeeklyContent(el, data) {
  const { content, week_start, generated_at } = data;
  const fmt = d => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  let head = '';
  if (week_start) {
    const monday = new Date(week_start + 'T00:00:00'); const sunday = new Date(monday); sunday.setDate(sunday.getDate() + 6);
    const updatedAt = generated_at ? new Date(generated_at).toLocaleString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }) : '';
    head = `<div style="margin-bottom:16px"><div style="font-family:var(--font-d);font-size:1.05rem;font-weight:700">${fmt(monday)} – ${fmt(sunday)}</div>${updatedAt ? `<div style="font-size:.74rem;color:var(--text-3);margin-top:2px">Updated ${updatedAt}</div>` : ''}</div>`;
  }
  const sections = [
    { key:'summary', title:'Summary', color:'var(--emerald)' },
    { key:'plan_adherence', title:'Plan Adherence', color:'var(--sky)' },
    { key:'performance', title:'Performance', color:'var(--amber)' },
    { key:'recovery', title:'Recovery & Wellness', color:'var(--violet)' },
    { key:'concerns', title:'Concerns', color:'var(--rose)' },
    { key:'tips', title:'Tips', color:'var(--emerald)' },
  ];
  let cards = '';
  for (const { key, title, color } of sections) {
    const text = content[key];
    if (!text || text.toLowerCase().trim() === 'none') continue;
    cards += `<div class="card card-pad-sm">
      <div class="eyebrow" style="color:${color};margin-bottom:8px">${title}</div>
      <div style="font-size:.88rem;color:var(--text-2);line-height:1.6;white-space:pre-line">${escHtml(text)}</div>
    </div>`;
  }
  el.innerHTML = `<div class="fade-in">${head}<div class="grid cols-auto">${cards}</div></div>`;
}

// ═══════════════════════════════════════════════════════
// VIEW: PLAN (editable — reads/writes planStore)
// ═══════════════════════════════════════════════════════
let planSelectedWeek = null;

async function renderPlan(page) {
  const active = await planStore.get().catch(() => null);

  if (!active || !active.accepted) {
    page.innerHTML = `<div class="fade-in">${emptyState('No training plan yet', 'Use “Ask the Coach” to generate one.', icons.plan)}
      <div style="text-align:center;margin-top:18px"><button class="btn btn-primary" id="plan-coach">${icons.spark} Ask the Coach</button></div></div>`;
    on('plan-coach', 'click', () => openCoachModal());
    return;
  }

  const weeks = active.weeks || [];
  if (planSelectedWeek == null) planSelectedWeek = currentWeekIndex(active);

  setTopbar('Plan', `${escHtml(active.name || 'Training Plan')} · ${active.total_weeks || weeks.length} weeks`,
    `<button class="btn btn-ghost btn-sm" id="plan-edit-paces">${icons.edit} Edit Paces</button>
     <button class="btn btn-ghost btn-sm" id="plan-coach">${icons.spark} Ask Coach</button>
     <button class="btn btn-outline btn-sm" id="plan-export">${icons.download} Export</button>
     <button class="btn btn-outline btn-sm" id="plan-reset">Reset</button>`);

  page.innerHTML = `<div class="fade-in">
    ${planHeaderHtml(active)}
    <div class="week-nav" id="week-nav">
      ${weeks.map((w, i) => `<button class="week-btn ${i===planSelectedWeek?'active':''}" data-week="${i}" title="${escHtml(w.focus || '')}">W${i+1}<small>${escHtml(w.phase || '')}</small></button>`).join('')}
    </div>
    <div id="week-info"></div>
    <div id="week-content"></div>
  </div>`;

  on('plan-edit-paces', 'click', () => openPaceEditor());
  on('plan-coach', 'click', () => openCoachModal('Week ' + (planSelectedWeek + 1)));
  on('plan-export', 'click', () => { planStore.export(); toast('ok', 'Exported', 'plan.json downloaded.'); });
  on('plan-reset', 'click', () => confirmResetPlan());

  page.querySelector('.week-btn.active')?.scrollIntoView({ inline: 'center', block: 'nearest' });
  page.querySelectorAll('.week-btn').forEach(btn => btn.addEventListener('click', () => {
    planSelectedWeek = +btn.dataset.week;
    page.querySelectorAll('.week-btn').forEach(b => b.classList.toggle('active', b === btn));
    drawWeek(active);
  }));

  drawWeek(active);
}

function planHeaderHtml(p) {
  return `<div class="card" style="margin-bottom:18px">
    <div class="card-h">
      <div>
        <div class="card-title" style="font-size:1.15rem">${escHtml(p.name || 'Training Plan')}</div>
        <div style="font-size:.82rem;color:var(--text-2);margin-top:5px">
          ${p.goal_type ? escHtml(p.goal_type) : ''}${p.target_date ? ' · Target ' + p.target_date : ''}${p.target_time_seconds ? ' · Goal ' + formatSeconds(p.target_time_seconds) : ''}
        </div>
      </div>
      ${p.vdot != null ? `<div style="text-align:right"><div class="eyebrow">VDOT</div><div style="font-family:var(--font-m);font-weight:700;font-size:1.4rem;color:var(--emerald)">${p.vdot.toFixed(1)}</div></div>` : ''}
    </div>
    <div class="pace-grid">
      ${paceItem('Easy', p.easy_pace)}${paceItem('Marathon', p.marathon_pace)}${paceItem('Threshold', p.threshold_pace)}${paceItem('Interval', p.interval_pace)}${paceItem('Repetition', p.repetition_pace)}
    </div>
    ${p.pace_source ? `<div style="font-size:.74rem;color:var(--text-3);margin-top:12px">Paces from ${escHtml(p.pace_source)}</div>` : ''}

  </div>`;
}

function paceItem(label, secPerKm) {
  if (!secPerKm) return '';
  return `<div class="pace-item"><div class="pl">${label}</div><div class="pv">${formatPace(secPerKm)}<span class="u">/km</span></div></div>`;
}

function drawWeek(plan) {
  const wi = planSelectedWeek;
  const w = (plan.weeks || [])[wi];
  if (!w) return;
  const infoEl = document.getElementById('week-info');
  if (infoEl) {
    const done = (w.workouts || []).filter(x => x.completed).length;
    infoEl.innerHTML = `<div class="card card-pad-sm" style="margin-bottom:14px;display:flex;align-items:center;gap:16px;flex-wrap:wrap">
      <div style="flex:1;min-width:160px">
        <div class="eyebrow">${escHtml(w.phase || 'Block')}${w.focus ? ' · ' + escHtml(w.focus) : ''}</div>
        <div style="font-size:.84rem;color:var(--text-2);margin-top:4px">${w.total_distance_km ? w.total_distance_km.toFixed(0) + ' km total' : ''} · ${done}/${(w.workouts||[]).length} workouts done</div>
      </div>
      <button class="btn btn-primary btn-sm" id="push-week">${icons.push} Push Week ${w.week_number || wi+1} to Garmin</button>
    </div>`;
    on('push-week', 'click', e => pushWeekToGarmin(w.week_number || (wi + 1), e.currentTarget));
  }
  const contentEl = document.getElementById('week-content');
  if (!contentEl) return;
  contentEl.className = 'grid cols-auto';
  contentEl.innerHTML = (w.workouts || []).map((wo, woIdx) => workoutCardHtml(wo, wi, woIdx)).join('') || emptyState('No workouts this week', '', icons.plan);
  contentEl.querySelectorAll('[data-open-wo]').forEach(el => el.addEventListener('click', () => {
    const [wkIdx, woIdx] = el.dataset.openWo.split(':').map(Number);
    showWorkoutSheet(plan.weeks[wkIdx].workouts[woIdx], wkIdx, woIdx);
  }));

  }));
}

function showWorkoutSheet(wo, wkIdx, woIdx) {

    stepsHtml = `<div style="margin-top:16px"><div class="eyebrow" style="margin-bottom:10px">Steps</div>`;
    for (const s of wo.steps) {

      stepsHtml += `<div class="step-item">

    }

  if (wo.completed && wo.completion_metrics) {

      ${detailItem(cm.distance_meters ? (cm.distance_meters/1000).toFixed(2) : '—', 'Distance')}
      ${detailItem(cm.duration_seconds ? formatSeconds(cm.duration_seconds) : '—', 'Duration')}
      ${detailItem(cm.avg_pace_sec_per_km ? formatPace(cm.avg_pace_sec_per_km) : '—', 'Pace')}
      ${detailItem(cm.avg_hr || '—', 'Avg HR')}
      ${detailItem(cm.max_hr || '—', 'Max HR')}
      ${detailItem(cm.calories || '—', 'Calories')}
    </div></div>`;
  }

  const editable = wkIdx != null && woIdx != null;
  openModal(`
    <div class="modal-h">
      <div>
        <div class="modal-title">${escHtml(wo.name || 'Workout')}</div>
        <div class="modal-sub">${escHtml((wo.workout_type || '').replace(/_/g,' '))}${dist ? ' · ' + dist : ''}${dur ? ' · ~' + dur : ''}</div>
      </div>
      <button class="modal-close" data-close>${icons.x}</button>
    </div>
    ${wo.description ? `<div style="font-size:.88rem;color:var(--text-2);line-height:1.55;margin-bottom:8px">${escHtml(wo.description)}</div>` : ''}
    ${stepsHtml}
    ${metricsHtml}
    ${editable ? `
      <div style="margin-top:18px;border-top:1px solid var(--border-s);padding-top:16px">
        <div class="field">
          <label for="wo-date">Reschedule date</label>
          <input type="date" id="wo-date" value="${wo.scheduled_date || ''}" class="mono-input">
        </div>
        <div class="field">
          <label for="wo-note">Note</label>
          <textarea id="wo-note" rows="3">${escHtml(wo.notes || '')}</textarea>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn ${wo.completed ? 'btn-ghost' : 'btn-outline'}" id="wo-toggle" style="${wo.completed ? 'color:var(--emerald)' : ''}">${wo.completed ? icons.check + ' Completed' : 'Mark complete'}</button>
          <button class="btn btn-primary" id="wo-save" style="margin-left:auto">Save changes</button>
        </div>
      </div>` : (wo.notes ? `<div style="margin-top:12px;font-size:.84rem;color:var(--text-3)">${escHtml(wo.notes)}</div>` : '')}

  if (editable) {
    on('wo-toggle', 'click', async () => {

// VIEW: CALENDAR

async function renderCalendar(page) {
  const now = new Date();
  let viewYear = now.getFullYear(), viewMonth = now.getMonth();
  const calEntries = {};

  const [plan, activities] = await Promise.all([
    planStore.get().catch(() => null),
    cached('activities', () => apiJson('/activities').catch(() => [])),
  ]);

  // Index activities + which ones a plan workout already claims, so a matched run
  // shows as ONE entry (the workout, opening its actual activity) — not two.
  const actById = {};
  for (const act of activities || []) actById[act.activity_id] = act;
  const matchedIds = new Set();
  if (plan && plan.weeks) {
    for (const w of plan.weeks) for (const wo of (w.workouts || [])) (wo.matched_activity_ids || []).forEach(id => matchedIds.add(id));
  }

  for (const act of activities || []) {
    const d = (act.start_time || '').slice(0, 10);
    if (!d || matchedIds.has(act.activity_id)) continue;
    const distKm = act.distance_meters ? (act.distance_meters/1000).toFixed(1) : null;
    const isRun = (act.activity_type || '').toLowerCase().includes('run');
    let sub = '';
    if (isRun && distKm && act.duration_seconds) sub = `${distKm} km · ${formatPace(act.duration_seconds/(act.distance_meters/1000))}/km`;
    else if (distKm) sub = `${distKm} km`;
    (calEntries[d] ||= []).push({ type:'activity', title: act.name || act.activity_type || 'Activity', sub, color: isRun ? 'var(--emerald)' : 'var(--violet)', activity: act });
  }

  const todayISO = new Date().toISOString().slice(0, 10);
  if (plan && plan.accepted) {
    for (const w of plan.weeks || []) {
      for (const wo of w.workouts || []) {
        if (!wo.scheduled_date) continue;
        const matchedAct = (wo.matched_activity_ids || []).map(id => actById[id]).find(Boolean) || null;
        // A past planned workout that wasn't completed is noise next to the actual
        // activities — show planned entries only for today and upcoming days.
        if (!matchedAct && wo.scheduled_date < todayISO) continue;
        const distKm = wo.estimated_distance_meters ? (wo.estimated_distance_meters/1000).toFixed(1) + ' km' : '';
        let sub = [wo.workout_type?.replace(/_/g,' '), distKm].filter(Boolean).join(' · ');
        if (matchedAct && matchedAct.distance_meters && matchedAct.duration_seconds) {
          sub = `${(matchedAct.distance_meters/1000).toFixed(1)} km · ${formatPace(matchedAct.duration_seconds/(matchedAct.distance_meters/1000))}/km`;
        }
        (calEntries[wo.scheduled_date] ||= []).push({
          type: matchedAct ? 'activity' : 'planned',
          title: (wo.completed ? '✓ ' : '○ ') + (wo.name || 'Workout'), sub,
          color: wo.completed ? 'var(--emerald)' : 'var(--sky)', wo, activity: matchedAct,
        });
      }
    }
  }

  function dayCell(d, ds, todayStr) {
    const entries = calEntries[ds] || [];
    const dots = entries.slice(0, 4).map(e => `<span class="cal-dot" style="background:${e.color}"></span>`).join('');
    return `<div class="cal-day ${ds === todayStr ? 'today' : ''}" data-date="${ds}"><div class="cal-num">${d}</div><div class="cal-dots">${dots}</div></div>`;
  }

  function drawMonth() {
    const first = new Date(viewYear, viewMonth, 1);
    const last = new Date(viewYear, viewMonth + 1, 0);
    const startDay = first.getDay();
    const monthName = first.toLocaleString('default', { month:'long', year:'numeric' });
    let grid = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => `<div class="cal-day-label">${d}</div>`).join('');
    const prevLast = new Date(viewYear, viewMonth, 0).getDate();
    for (let i = startDay - 1; i >= 0; i--) grid += `<div class="cal-day other-month"><div class="cal-num">${prevLast - i}</div></div>`;
    const todayStr = new Date().toISOString().slice(0,10);
    for (let d = 1; d <= last.getDate(); d++) {
      const ds = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      grid += dayCell(d, ds, todayStr);
    }
    const remaining = (7 - (startDay + last.getDate()) % 7) % 7;
    for (let i = 1; i <= remaining; i++) grid += `<div class="cal-day other-month"><div class="cal-num">${i}</div></div>`;
    return `<div class="fade-in"><div class="dash-grid"><div class="span-5">
      <div class="card">
        <div class="card-h"><div class="card-title">${monthName}</div><div style="display:flex;gap:8px"><button class="btn-icon" id="cal-prev" aria-label="Previous month">‹</button><button class="btn-icon" id="cal-next" aria-label="Next month">›</button></div></div>
        <div class="cal-grid compact">${grid}</div>
      </div></div>
      <div class="span-7"><div class="card" style="height:100%" id="cal-details"><div class="empty" style="border:none;padding:32px 12px">Select a day to see details.</div></div></div>
    </div></div>`;
  }

  // Render the selected day's entry list into the side panel; clicking an entry swaps
  // the panel for that activity/workout's full detail (inline — no popup).
  function showDay(ds) {
    const details = document.getElementById('cal-details');
    const entries = calEntries[ds] || [];
    const dateLabel = new Date(ds + 'T00:00:00').toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });
    if (!entries.length) { details.innerHTML = `<div class="card-h"><div class="card-title" style="font-size:.95rem">${dateLabel}</div></div><div class="empty" style="border:none;padding:24px 0">Nothing scheduled.</div>`; return; }
    details.innerHTML = `<div class="card-h"><div class="card-title" style="font-size:.95rem">${dateLabel}</div></div>` + entries.map((e, i) => `
      <div class="act-item" data-cal-idx="${i}"><div class="act-bar" style="background:${e.color}"></div>
        <div class="act-info"><div class="act-name">${escHtml(e.title)}</div>${e.sub ? `<div class="act-meta">${escHtml(e.sub)}</div>` : ''}</div></div>`).join('');
    details.querySelectorAll('[data-cal-idx]').forEach(c => c.addEventListener('click', () => {
      const e = entries[+c.dataset.calIdx];
      if (e.type === 'activity' && e.activity) renderActivityDetail(details, e.activity, { onBack: () => showDay(ds) });
      else if (e.type === 'planned' && e.wo) renderWorkoutDetail(details, e.wo, { onBack: () => showDay(ds) });
    }));
  }

  function reDraw() {
    page.innerHTML = drawMonth();
    page.querySelectorAll('.cal-day[data-date]').forEach(el => el.addEventListener('click', () => {
      page.querySelectorAll('.cal-day.selected').forEach(s => s.classList.remove('selected'));
      el.classList.add('selected');
      showDay(el.dataset.date);
    }));
    on('cal-prev', 'click', () => { viewMonth--; if (viewMonth<0){viewMonth=11;viewYear--;} reDraw(); });
    on('cal-next', 'click', () => { viewMonth++; if (viewMonth>11){viewMonth=0;viewYear++;} reDraw(); });
  }
  reDraw();
}

async function loadText(file) {
  const res = await fetch('./data/' + file);
  if (!res.ok) throw new Error('not found');
